<h1><span class="c">/* </span>hippolyte-bayard - proofs<span class="c"> */</span></h1>
<p class="sub">10 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-self-portrait-drowned-man.png" alt="01-self-portrait-drowned-man" loading="lazy">
  <figcaption><span class="id">01-self-portrait-drowned-man</span><br>A staged corpse: the head lolled dead against the shoulder and a hat set aside like a grave marker read as documentary fact because the flat, frontal lighting gives the fiction no seams.</figcaption>
</figure>
<figure>
  <img src="02-windmills-montmartre.png" alt="02-windmills-montmartre" loading="lazy">
  <figcaption><span class="id">02-windmills-montmartre</span><br>Two windmill silhouettes bracket a level rooftop line, banding the built town dark beneath a vast pale sky -- the tonal recession that gives this direct positive its ghostly stillness.</figcaption>
</figure>
<figure>
  <img src="03-still-life-statuary.png" alt="03-still-life-statuary" loading="lazy">
  <figcaption><span class="id">03-still-life-statuary</span><br>A parted curtain turns a shelf of plaster casts into a proscenium, with Venus de Milo held dead-center on the bilateral axis like a formal portrait sitter.</figcaption>
</figure>
<figure>
  <img src="04-self-portrait-garden.png" alt="04-self-portrait-garden" loading="lazy">
  <figcaption><span class="id">04-self-portrait-garden</span><br>Bayard braces on a barrel placed on the right-hand third while a ladder&#x27;s diagonal cuts across the trellis&#x27;s rigid lattice, his figure reading in silhouette against its grid.</figcaption>
</figure>
<figure>
  <img src="05-construction-worker-paris.png" alt="05-construction-worker-paris" loading="lazy">
  <figcaption><span class="id">05-construction-worker-paris</span><br>A symmetrical shuttered window and its own shadowed lintel impose a formal grid on the upper register, while the barred window and the off-axis worker below puncture that order with documentary asymmetry.</figcaption>
</figure>
<figure>
  <img src="06-cirque-national-paris.png" alt="06-cirque-national-paris" loading="lazy">
  <figcaption><span class="id">06-cirque-national-paris</span><br>Bayard sets the circus rotunda&#x27;s domed drum on the same vertical axis as the print&#x27;s own arched mount, so the round architecture and the round vignette share one radial symmetry.</figcaption>
</figure>
<figure>
  <img src="07-panorama-louvre-tuileries.png" alt="07-panorama-louvre-tuileries" loading="lazy">
  <figcaption><span class="id">07-panorama-louvre-tuileries</span><br>Depth is built by tonal recession alone -- a level line of rooftops, dome and turrets barely breaking it, floating in flat gray air above a dark, detail-less foreground, with no converging lines to construct perspective.</figcaption>
</figure>
<figure>
  <img src="08-rue-royale-shopfronts.png" alt="08-rue-royale-shopfronts" loading="lazy">
  <figcaption><span class="id">08-rue-royale-shopfronts</span><br>The roofline and shopfront cornice rake back in tandem toward a shared vanishing point, flattening the row&#x27;s repeating bays and painted signage into one raking street elevation.</figcaption>
</figure>
<figure>
  <img src="09-column-barriere-du-trone.png" alt="09-column-barriere-du-trone" loading="lazy">
  <figcaption><span class="id">09-column-barriere-du-trone</span><br>The column plants itself dead-center on the frame&#x27;s vertical axis, its statue-topped capital nearly touching the top edge, while the symmetric twin-pedimented gatehouse at its foot echoes the same mirror symmetry at ground level.</figcaption>
</figure>
<figure>
  <img src="10-fontaine-quatre-eveques.png" alt="10-fontaine-quatre-eveques" loading="lazy">
  <figcaption><span class="id">10-fontaine-quatre-eveques</span><br>Shot dead-on, the fountain&#x27;s niche, seated bishop and flanking columns lock into strict mirror symmetry, with the shallow foreground water laying a soft horizontal band beneath the vertical architecture.</figcaption>
</figure>
