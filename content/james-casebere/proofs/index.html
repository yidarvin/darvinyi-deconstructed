<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>James Casebere — overlay proofs</title>
  <style>
    body { margin: 24px; background: #111827; color: #e5e7eb; font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
    h1 { font-size: 18px; }
    main { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    figure { margin: 0; } img { display: block; width: 100%; height: auto; } figcaption { padding-top: 6px; }
  </style>
</head>
<body>
  <h1>James Casebere — composition overlay proofs</h1>
  <main>
    <figure><img src="01-pink-hallway-3.png" alt="Pink Hallway #3 overlay proof"><figcaption>01 — Pink Hallway #3</figcaption></figure>
    <figure><img src="02-nevisian-underground-1.png" alt="Nevisian Underground #1 overlay proof"><figcaption>02 — Nevisian Underground #1</figcaption></figure>
    <figure><img src="03-monticello-1.png" alt="Monticello #1 overlay proof"><figcaption>03 — Monticello #1</figcaption></figure>
    <figure><img src="04-monticello-3.png" alt="Monticello #3 overlay proof"><figcaption>04 — Monticello #3</figcaption></figure>
    <figure><img src="05-yellow-hallway-2.png" alt="Yellow Hallway #2 overlay proof"><figcaption>05 — Yellow Hallway #2</figcaption></figure>
    <figure><img src="06-green-staircase-1.png" alt="Green Staircase #1 overlay proof"><figcaption>06 — Green Staircase #1</figcaption></figure>
    <figure><img src="07-green-staircase-4.png" alt="Green Staircase #4 overlay proof"><figcaption>07 — Green Staircase #4</figcaption></figure>
    <figure><img src="08-dorm-room.png" alt="Dorm Room overlay proof"><figcaption>08 — Dorm Room</figcaption></figure>

    <figure><img src="10-tunnel-2.png" alt="Tunnel #2 overlay proof"><figcaption>10 — Tunnel #2</figcaption></figure>
    <figure><img src="12-spanish-bath-vertical.png" alt="Spanish Bath (Vertical) overlay proof"><figcaption>11 — Spanish Bath (Vertical)</figcaption></figure>
  </main>
</body>
</html>
