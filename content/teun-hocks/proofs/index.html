<h1><span class="c">/* </span>teun-hocks - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-untitled-2006.png" alt="01-untitled-2006" loading="lazy">
  <figcaption><span class="id">01-untitled-2006</span><br>The low field edge gives the small figure and duck an outsized stage of pale air.</figcaption>
</figure>
<figure>
  <img src="02-untitled-moon-2007.png" alt="02-untitled-moon-2007" loading="lazy">
  <figcaption><span class="id">02-untitled-moon-2007</span><br>A solitary vertical body is held between a dark field and the shallow rise of the moon.</figcaption>
</figure>
<figure>
  <img src="03-untitled-261-2015.png" alt="03-untitled-261-2015" loading="lazy">
  <figcaption><span class="id">03-untitled-261-2015</span><br>Two near-matched figures make the central smoke interruption more conspicuous than either portrait alone.</figcaption>
</figure>
<figure>
  <img src="04-untitled-259-2015.png" alt="04-untitled-259-2015" loading="lazy">
  <figcaption><span class="id">04-untitled-259-2015</span><br>The figure and improbable birdhouse are made small by the broad, almost unoccupied sky.</figcaption>
</figure>
<figure>
  <img src="05-untitled-253-2014.png" alt="05-untitled-253-2014" loading="lazy">
  <figcaption><span class="id">05-untitled-253-2014</span><br>A small seated figure at right makes the empty water and sky feel like a patiently held interval.</figcaption>
</figure>
<figure>
  <img src="06-untitled-255-2015.png" alt="06-untitled-255-2015" loading="lazy">
  <figcaption><span class="id">06-untitled-255-2015</span><br>A perfectly calm water field turns the small paired gestures into an intentionally absurd ceremony.</figcaption>
</figure>
<figure>
  <img src="07-untitled-260-2015.png" alt="07-untitled-260-2015" loading="lazy">
  <figcaption><span class="id">07-untitled-260-2015</span><br>The frontal body is held low in a spare snowfield whose scattered flakes resist a tidy backdrop.</figcaption>
</figure>
<figure>
  <img src="08-untitled-227-2008.png" alt="08-untitled-227-2008" loading="lazy">
  <figcaption><span class="id">08-untitled-227-2008</span><br>The low improvised shelter makes the distant housing block register as a remote, impersonal backdrop.</figcaption>
</figure>
<figure>
  <img src="09-untitled-240-2010.png" alt="09-untitled-240-2010" loading="lazy">
  <figcaption><span class="id">09-untitled-240-2010</span><br>The hunter&#x27;s lateral movement is delayed by a shallow landscape that opens toward the fox at right.</figcaption>
</figure>
<figure>
  <img src="10-untitled-215-2007.png" alt="10-untitled-215-2007" loading="lazy">
  <figcaption><span class="id">10-untitled-215-2007</span><br>A low sleeping body and its books make an oblique stage beneath a compressed nocturnal field.</figcaption>
</figure>
<figure>
  <img src="11-untitled-208-2004.png" alt="11-untitled-208-2004" loading="lazy">
  <figcaption><span class="id">11-untitled-208-2004</span><br>The dark branch bundle cuts across a pale field, making the tiny distant house a measure of scale.</figcaption>
</figure>
<figure>
  <img src="12-untitled-242-2011.png" alt="12-untitled-242-2011" loading="lazy">
  <figcaption><span class="id">12-untitled-242-2011</span><br>The traveller and suitcase hold the foreground while the smoking ship remains a small disturbance at depth.</figcaption>
</figure>
