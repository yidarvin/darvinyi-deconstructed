<!doctype html>
<html lang="en">
  <head>

    <title>Shomei Tomatsu overlay proofs</title>
    <style>

  <body>

      <figure><img src="03-eiko-oshima-prize-stock.png" alt="Overlay proof: Eiko Oshima"><figcaption>03 — Eiko Oshima</figcaption></figure>
      <figure><img src="04-asphalt-tokyo.png" alt="Overlay proof: Asphalt"><figcaption>04 — Asphalt</figcaption></figure>
      <figure><img src="05-editor-nakahira-shinjuku.png" alt="Overlay proof: Editor, Takuma Nakahira"><figcaption>05 — Editor, Takuma Nakahira</figcaption></figure>
      <figure><img src="06-screen-shinjuku.png" alt="Overlay proof: Screen"><figcaption>06 — Screen</figcaption></figure>

      <figure><img src="11-iwakuni-yamaguchi.png" alt="Overlay proof: Iwakuni"><figcaption>11 — Iwakuni</figcaption></figure>
      <figure><img src="12-yokosuka-kanagawa.png" alt="Overlay proof: Yokosuka"><figcaption>12 — Yokosuka</figcaption></figure>
    </main>
  </body>
</html>
