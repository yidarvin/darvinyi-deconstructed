<h1><span class="c">/* </span>horst-p-horst - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure><img src="01-mainbocher-corset.png" alt="Mainbocher Corset" loading="lazy"><figcaption><span class="id">01-mainbocher-corset</span><br>Bench, shoulders, and corset lacing turn a figure into a precise vertical construction.</figcaption></figure>
<figure><img src="02-estrella-boissevain-bergdorf-goodman.png" alt="Estrella Boissevain" loading="lazy"><figcaption><span class="id">02-estrella-boissevain-bergdorf-goodman</span><br>A profile is staged against a lit rectangle with chair, cane, and plaster heads.</figcaption></figure>
<figure><img src="03-bacchanale-costumes.png" alt="Bacchanale costumes" loading="lazy"><figcaption><span class="id">03-bacchanale-costumes</span><br>Two opposed performers make costume and set read as a balanced theatrical mass.</figcaption></figure>
<figure><img src="04-marlene-dietrich.png" alt="Marlene Dietrich" loading="lazy"><figcaption><span class="id">04-marlene-dietrich</span><br>Hat brim, lit face, and reflective chair compose a deliberately hard glamour portrait.</figcaption></figure>
<figure><img src="05-schiaparelli-dinner-suit.png" alt="Schiaparelli dinner suit" loading="lazy"><figcaption><span class="id">05-schiaparelli-dinner-suit</span><br>Silhouette, chair, bow, and tilted color planes make a compact set-piece.</figcaption></figure>
<figure><img src="06-male-nude.png" alt="Male Nude" loading="lazy"><figcaption><span class="id">06-male-nude</span><br>An arch of arms and a plinth turn the body into a sculptural light study.</figcaption></figure>
<figure><img src="07-summer-fashions-vogue-cover.png" alt="Summer Fashions Vogue cover" loading="lazy"><figcaption><span class="id">07-summer-fashions-vogue-cover</span><br>Balloon axis, limb junction, and reclining head make a centered cover-scale design.</figcaption></figure>
<figure><img src="08-hattie-carnegie-dress.png" alt="Hattie Carnegie dress" loading="lazy"><figcaption><span class="id">08-hattie-carnegie-dress</span><br>Striped backdrop and dress folds establish counter-rhythms of horizontal and diagonal line.</figcaption></figure>
<figure><img src="09-muriel-maxwell-vogue-cover.png" alt="Muriel Maxwell Vogue cover" loading="lazy"><figcaption><span class="id">09-muriel-maxwell-vogue-cover</span><br>Sunglasses, lipstick gesture, striped accessory, and table edge make a graphic triangle.</figcaption></figure>
<figure><img src="10-coco-chanel.png" alt="Coco Chanel" loading="lazy"><figcaption><span class="id">10-coco-chanel</span><br>A reclining profile is enclosed by an armchair curve and the border of the surviving print.</figcaption></figure>
<figure><img src="11-noel-coward-paul.png" alt="Noel Coward as Paul" loading="lazy"><figcaption><span class="id">11-noel-coward-paul</span><br>Print border and portrait axis make costume and expression into staged performance.</figcaption></figure>
