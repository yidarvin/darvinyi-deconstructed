<h1><span class="c">/* </span>dorothea-lange - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-migrant-mother.png" alt="01-migrant-mother" loading="lazy">
  <figcaption><span class="id">01-migrant-mother</span><br>Classical pyramid: mother&#x27;s head the apex, flanking children its sides, crossed forearm the base — a frontal figure pinned to the central axis, hand as keystone.</figcaption>
</figure>
<figure>
  <img src="02-damaged-child.png" alt="02-damaged-child" loading="lazy">
  <figcaption><span class="id">02-damaged-child</span><br>Frontal child pinned to a flat board wall: a central vertical axis and the horizontal seam form the cross that traps her; the body rises as a shallow pyramid to the face, the psychological center.</figcaption>
</figure>
<figure>
  <img src="03-toward-los-angeles.png" alt="03-toward-los-angeles" loading="lazy">
  <figcaption><span class="id">03-toward-los-angeles</span><br>Two migrants on foot, bisected by the horizon, walk the dirt shoulder toward the ironic Southern Pacific billboard promising an easier way to travel.</figcaption>
</figure>
<figure>
  <img src="04-tractored-out.png" alt="04-tractored-out" loading="lazy">
  <figcaption><span class="id">04-tractored-out</span><br>Contour-plow furrows sweep up to a low vanishing point beneath the abandoned house; a high horizon presses the ravaged earth against an empty sky.</figcaption>
</figure>
<figure>
  <img src="05-woman-high-plains.png" alt="05-woman-high-plains" loading="lazy">
  <figcaption><span class="id">05-woman-high-plains</span><br>A single figure monumentalized against the empty high-plains sky; the raised forearm climbs to the hand pressed at her brow, the gesture that carries the frame.</figcaption>
</figure>
<figure>
  <img src="06-filipinos-cutting-lettuce.png" alt="06-filipinos-cutting-lettuce" loading="lazy">
  <figcaption><span class="id">06-filipinos-cutting-lettuce</span><br>A frieze of stooped pickers: bent backs repeat in a receding rank while the cracked furrow draws the eye up into the field&#x27;s depth.</figcaption>
</figure>
<figure>
  <img src="07-drought-refugees.png" alt="07-drought-refugees" loading="lazy">
  <figcaption><span class="id">07-drought-refugees</span><br>A migrant family clustered into a pyramid on the dusty roadside, wedged between the tent behind and the dark loaded car ahead.</figcaption>
</figure>
<figure>
  <img src="08-plantation-overseer.png" alt="08-plantation-overseer" loading="lazy">
  <figcaption><span class="id">08-plantation-overseer</span><br>A monumental foreground planter, foot planted on his car, fills the frame while the Black workers recede as a compressed social plane behind.</figcaption>
</figure>
<figure>
  <img src="09-ex-slave-long-memory.png" alt="09-ex-slave-long-memory" loading="lazy">
  <figcaption><span class="id">09-ex-slave-long-memory</span><br>Planted frontally on the central axis, the standing figure is doubled by the vertical of her cane; the white-scarfed head crowns the column and the crossed hands hold its center.</figcaption>
</figure>
<figure>
  <img src="10-family-walking-highway.png" alt="10-family-walking-highway" loading="lazy">
  <figcaption><span class="id">10-family-walking-highway</span><br>One-point recession down a wide graded highway: the road drives to a vanishing point at the distant tree line while the migrant family strings back along the corridor — the father hauling the cart largest in the foreground, the others dwindling into the distance.</figcaption>
</figure>
<figure>
  <img src="11-mochida-family-hayward-evacuation.png" alt="11-mochida-family-hayward-evacuation" loading="lazy">
  <figcaption><span class="id">11-mochida-family-hayward-evacuation</span><br>A frontal wall of eleven: elders ranked along a descending headline, children massed below, the family surname stenciled on the tagged luggage at their feet — people readied for shipment.</figcaption>
</figure>
<figure>
  <img src="12-pledge-of-allegiance.png" alt="12-pledge-of-allegiance" loading="lazy">
  <figcaption><span class="id">12-pledge-of-allegiance</span><br>The pledge as rhythm: three girls, three hands to three hearts — one repeated gesture threading a row of small figures.</figcaption>
</figure>
