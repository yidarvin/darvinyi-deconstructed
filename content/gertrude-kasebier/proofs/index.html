<h1><span class="c">/* </span>gertrude-kasebier - proofs<span class="c"> */</span></h1>
<p class="sub">10 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-the-manger.png" alt="01-the-manger" loading="lazy">
  <figcaption><span class="id">01-the-manger</span><br>The mother-and-child group gathers beneath a tilted architectural break while the window&#x27;s pale rectangle counterbalances the bowed figure.</figcaption>
</figure>
<figure>
  <img src="02-blessed-art-thou-among-women.png" alt="02-blessed-art-thou-among-women" loading="lazy">
  <figcaption><span class="id">02-blessed-art-thou-among-women</span><br>The doorway makes the child an upright dark mass; the mother&#x27;s pale diagonal interrupts that stillness from behind.</figcaption>
</figure>
<figure>
  <img src="03-family-group.png" alt="03-family-group" loading="lazy">
  <figcaption><span class="id">03-family-group</span><br>Four faces make a shallow arc above a single pooled dark mass, while the patterned tablecloth seals the group into the frame.</figcaption>
</figure>
<figure>
  <img src="04-florentine-boy.png" alt="04-florentine-boy" loading="lazy">
  <figcaption><span class="id">04-florentine-boy</span><br>A bright profile advances from a very dark field; the calm horizontal of the shoulder and the gaze to the right hold the portrait taut.</figcaption>
</figure>
<figure>
  <img src="05-portrait-of-a-boy.png" alt="05-portrait-of-a-boy" loading="lazy">
  <figcaption><span class="id">05-portrait-of-a-boy</span><br>The softly balanced face is a small island of light; the surrounding brown field keeps attention on the eyes.</figcaption>
</figure>
<figure>
  <img src="06-the-bat.png" alt="06-the-bat" loading="lazy">
  <figcaption><span class="id">06-the-bat</span><br>The faint figure is held inside one broad wing-shaped silhouette, a tonal apparition that only gradually separates from the dark ground.</figcaption>
</figure>
<figure>
  <img src="07-little-good-harbor-maine.png" alt="07-little-good-harbor-maine" loading="lazy">
  <figcaption><span class="id">07-little-good-harbor-maine</span><br>Dark rocks form a rough aperture around a pale channel, which carries the eye toward the low distant shore.</figcaption>
</figure>
<figure>
  <img src="08-sunshine-in-the-house.png" alt="08-sunshine-in-the-house" loading="lazy">
  <figcaption><span class="id">08-sunshine-in-the-house</span><br>Window, doorway, curtain, and the long stripe of sun turn a family interior into a deliberately staged convergence.</figcaption>
</figure>
<figure>
  <img src="09-the-bride.png" alt="09-the-bride" loading="lazy">
  <figcaption><span class="id">09-the-bride</span><br>The veil supplies a dark, almost symmetrical enclosure around a small downcast face and luminous gown.</figcaption>
</figure>
<figure>
  <img src="10-yoked-and-muzzled.png" alt="10-yoked-and-muzzled" loading="lazy">
  <figcaption><span class="id">10-yoked-and-muzzled</span><br>The bright yoke crosses two dark animal masses, making the binding device immediately legible within a low, horizontal pastoral frame.</figcaption>
</figure>
