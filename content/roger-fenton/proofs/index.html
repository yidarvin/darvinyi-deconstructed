<h1><span class="c">/* </span>roger-fenton - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-valley-of-shadow.png" alt="01-valley-of-shadow" loading="lazy">
  <figcaption><span class="id">01-valley-of-shadow</span><br>The sunken road&#x27;s converging ruts collapse the whole valley to one distant vanishing point, and the litter of round shot is the only incident breaking the emptiness of that perspectival corridor.</figcaption>
</figure>
<figure>
  <img src="02-council-of-war.png" alt="02-council-of-war" loading="lazy">
  <figcaption><span class="id">02-council-of-war</span><br>The three Allied commanders lean into a loose triangle over the map table, its apex at their joined hands, while Raglan&#x27;s plain civilian coat (left) marks his rank apart from the uniformed Pelissier and Omar Pasha, all set beneath the shadowed doorway.</figcaption>
</figure>
<figure>
  <img src="03-artists-van.png" alt="03-artists-van" loading="lazy">
  <figcaption><span class="id">03-artists-van</span><br>Fenton poses his own photographic van frontally and centered like a portrait sitter, its own window doubling as a frame-within-a-frame, while only the trailing wagon shafts break the symmetry.</figcaption>
</figure>
<figure>
  <img src="04-balaklava-guards-hill.png" alt="04-balaklava-guards-hill" loading="lazy">
  <figcaption><span class="id">04-balaklava-guards-hill</span><br>A high vantage on Guard&#x27;s Hill telescopes the view into stacked horizontal bands -- foreground tent camp, the crowded Balaklava anchorage, and the ruined fort on the ridge beyond -- terrain documented rather than incident staged.</figcaption>
</figure>
<figure>
  <img src="05-vivandiere.png" alt="05-vivandiere" loading="lazy">
  <figcaption><span class="id">05-vivandiere</span><br>A studio-formal full-length portrait of the vivandière, gaze turned off-camera, with a soldier sliced by the frame&#x27;s right edge planted as scale and counterweight.</figcaption>
</figure>
<figure>
  <img src="06-a-zouave.png" alt="06-a-zouave" loading="lazy">
  <figcaption><span class="id">06-a-zouave</span><br>Posed against a plain studio ground, the wounded Zouave&#x27;s head rests almost exactly on the frame&#x27;s mirror axis while his sprawled body, propped fleece, and grounded rifle do the rest of the compositional work.</figcaption>
</figure>
<figure>
  <img src="07-lord-raglan.png" alt="07-lord-raglan" loading="lazy">
  <figcaption><span class="id">07-lord-raglan</span><br>The commander sits off-center on his own folding camp stool at a real threshold, not a studio backdrop -- the dark doorway itself acts as the portrait&#x27;s frame, isolating his lit face and the plumed hat he holds rather than wears.</figcaption>
</figure>
<figure>
  <img src="08-camp-5th-dragoon-guards.png" alt="08-camp-5th-dragoon-guards" loading="lazy">
  <figcaption><span class="id">08-camp-5th-dragoon-guards</span><br>Shot from high on the slope, the frame stacks into flat bands -- sky, a nearly level ridge, and a foreground frieze of tents, horses, and men -- reading the camp as horizontal terrain rather than a scene organized by depth.</figcaption>
</figure>
<figure>
  <img src="09-cathcarts-hill-tombs.png" alt="09-cathcarts-hill-tombs" loading="lazy">
  <figcaption><span class="id">09-cathcarts-hill-tombs</span><br>A near-flat hill crest divides the frame into vast empty sky and stony ground; the ordered rank of grave markers and the single mourning figure beside them are the only interruptions, the man&#x27;s small scale measuring the cemetery&#x27;s scale.</figcaption>
</figure>
<figure>
  <img src="10-balaklava-cattle-pier.png" alt="10-balaklava-cattle-pier" loading="lazy">
  <figcaption><span class="id">10-balaklava-cattle-pier</span><br>Hillside, moored ship, dockside shed, and penned cattle stack into frontal, deadpan registers -- overlapping planes rather than a single receding perspective.</figcaption>
</figure>
<figure>
  <img src="11-cookhouse-8th-hussars.png" alt="11-cookhouse-8th-hussars" loading="lazy">
  <figcaption><span class="id">11-cookhouse-8th-hussars</span><br>A studio-casual muster around the cookpots resolves into a centered, balanced cluster, with Fenton&#x27;s own van anchoring the frame&#x27;s edge.</figcaption>
</figure>
