<h1><span class="c">/* </span>anna-atkins - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-sargassum-bacciferum.png" alt="01-sargassum-bacciferum" loading="lazy">
  <figcaption><span class="id">01-sargassum-bacciferum</span><br>The opening plate&#x27;s frond scatters diagonally across the page in a loose, irregular constellation from base to tip -- its berry-like bladders the plate&#x27;s namesake detail -- setting the specimen-map template the whole series follows.</figcaption>
</figure>
<figure>
  <img src="02-dictyota-dichotoma.png" alt="02-dictyota-dichotoma" loading="lazy">
  <figcaption><span class="id">02-dictyota-dichotoma</span><br>A single radiating, dichotomously-branching frond fills the lower two-thirds like a fan of lightning, balanced against three small scattered sprigs above.</figcaption>
</figure>
<figure>
  <img src="03-himanthalia-lorea.png" alt="03-himanthalia-lorea" loading="lazy">
  <figcaption><span class="id">03-himanthalia-lorea</span><br>Built entirely on line and length: strap-like thongs cascade the full height of the plate in loose, roughly mirrored parallel curves from one basal button.</figcaption>
</figure>
<figure>
  <img src="04-laminaria-digitata.png" alt="04-laminaria-digitata" loading="lazy">
  <figcaption><span class="id">04-laminaria-digitata</span><br>The frond&#x27;s finger-like lobes splay open at the top-left crown while a single diagonal axis carries the eye from that fan down to the small holdfast anchoring it near center.</figcaption>
</figure>
<figure>
  <img src="05-delesseria-sanguinea.png" alt="05-delesseria-sanguinea" loading="lazy">
  <figcaption><span class="id">05-delesseria-sanguinea</span><br>Three fronds fan across a thirds grid; the upper-left blade&#x27;s crisp pinnate veining argues for naturalistic tonal modeling against the lower cluster&#x27;s flattened, coralline-obscured mass.</figcaption>
</figure>
<figure>
  <img src="06-padina-pavonia.png" alt="06-padina-pavonia" loading="lazy">
  <figcaption><span class="id">06-padina-pavonia</span><br>Three Padina Pavonia fronds, each a radial burst of concentric growth rings, are set in a stable triangle across the page rather than a grid.</figcaption>
</figure>
<figure>
  <img src="07-ceramium-rubrum.png" alt="07-ceramium-rubrum" loading="lazy">
  <figcaption><span class="id">07-ceramium-rubrum</span><br>A hair-thin frond radiates from a single holdfast and cascades into a nearly empty cyanotype field, reading as delicacy against negative space.</figcaption>
</figure>
<figure>
  <img src="08-chondrus-crispus.png" alt="08-chondrus-crispus" loading="lazy">
  <figcaption><span class="id">08-chondrus-crispus</span><br>Three impressions of the same dense, forking frond sit as a mirrored triangle on the page — the specimen reads as solid tonal mass, not line.</figcaption>
</figure>
<figure>
  <img src="09-polysiphonia-violacea.png" alt="09-polysiphonia-violacea" loading="lazy">
  <figcaption><span class="id">09-polysiphonia-violacea</span><br>The frond&#x27;s two mirrored sprays hover in the phi-marked upper register of the page, leaving the lower two-thirds empty cyanotype blue broken only by the small handwritten caption far below.</figcaption>
</figure>
<figure>
  <img src="10-cystoseira-granulata.png" alt="10-cystoseira-granulata" loading="lazy">
  <figcaption><span class="id">10-cystoseira-granulata</span><br>Two great fronds fan almost symmetrically upward from a single root point, while a loose lower branch keeps the radial growth from reading as mechanical.</figcaption>
</figure>
<figure>
  <img src="11-plocamium-coccineum.png" alt="11-plocamium-coccineum" loading="lazy">
  <figcaption><span class="id">11-plocamium-coccineum</span><br>Three fronds are balanced across a near-central axis, but the upper-left specimen&#x27;s sharply zigzagging branch is the plate&#x27;s clearest instance of Atkins&#x27;s comb-like, almost typographic patterning.</figcaption>
</figure>
