<h1><span class="c">/* </span>margaret-bourke-white - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-workers-blow-off-steam.png" alt="01-workers-blow-off-steam" loading="lazy">
  <figcaption><span class="id">01-workers-blow-off-steam</span><br>Linked figures and hard light activate a tightly packed night gathering.</figcaption>
</figure>
<figure>
  <img src="02-wheeler-montana.png" alt="02-wheeler-montana" loading="lazy">
  <figcaption><span class="id">02-wheeler-montana</span><br>A shallow town band holds open sky without pretending the settlement is symmetrical.</figcaption>
</figure>
<figure>
  <img src="03-new-deal-montana.png" alt="03-new-deal-montana" loading="lazy">
  <figcaption><span class="id">03-new-deal-montana</span><br>An oversized sign turns text, faces, and the roadside setting into one graphic field.</figcaption>
</figure>
<figure>
  <img src="04-no-beer-sold-to-indians.png" alt="04-no-beer-sold-to-indians" loading="lazy">
  <figcaption><span class="id">04-no-beer-sold-to-indians</span><br>Text, figure, and bar geometry establish a severe social hierarchy.</figcaption>
</figure>
<figure>
  <img src="05-lt-col-larkin.png" alt="05-lt-col-larkin" loading="lazy">
  <figcaption><span class="id">05-lt-col-larkin</span><br>A face-filling portrait turns gaze and background texture into a tight field.</figcaption>
</figure>
<figure>
  <img src="06-bar-x-montana.png" alt="06-bar-x-montana" loading="lazy">
  <figcaption><span class="id">06-bar-x-montana</span><br>Ceiling fringe, a back-wall window, and the front rail make a dense room readable without inventing diagonal bar edges.</figcaption>
</figure>
<figure>
  <img src="07-steel-river-liner.png" alt="07-steel-river-liner" loading="lazy">
  <figcaption><span class="id">07-steel-river-liner</span><br>A sweeping steel enclosure makes depth and scale tangible.</figcaption>
</figure>
<figure>
  <img src="08-mrs-nelson-washing.png" alt="08-mrs-nelson-washing" loading="lazy">
  <figcaption><span class="id">08-mrs-nelson-washing</span><br>The upright figure and doorway turn domestic labor into a vertical rhythm without mistaking a tonal split for a boundary.</figcaption>
</figure>

  <img src="09-fort-peck-workers.png" alt="09-fort-peck-workers" loading="lazy">
  <figcaption><span class="id">09-fort-peck-workers</span><br>The packed workers give a scale reference to the construction field behind them; rails, not false balance, open the site at left.</figcaption>

  <img src="10-fort-peck-construction.png" alt="10-fort-peck-construction" loading="lazy">
