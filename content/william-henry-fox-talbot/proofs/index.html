<h1><span class="c">/* </span>william-henry-fox-talbot - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-latticed-window.png" alt="01-latticed-window" loading="lazy">
  <figcaption><span class="id">01-latticed-window</span><br>Three nested rectangles -- archive mount, negative, and the negative&#x27;s own faint pane grid -- show the oriel window&#x27;s leaded lattice already forming the grid this book otherwise has to draw.</figcaption>
</figure>
<figure>
  <img src="02-the-open-door.png" alt="02-the-open-door" loading="lazy">
  <figcaption><span class="id">02-the-open-door</span><br>A rectilinear stone doorway is cut across by the diagonal thrust of a leaning broom, its threshold the line where sunlight breaks into the dark interior.</figcaption>
</figure>
<figure>
  <img src="03-the-haystack.png" alt="03-the-haystack" loading="lazy">
  <figcaption><span class="id">03-the-haystack</span><br>The ladder&#x27;s steep climb and the eave&#x27;s shallow counter-diagonal brace a haystack built to fill the frame edge to edge, its resolved straw texture standing as the true specimen the calotype exists to prove.</figcaption>
</figure>
<figure>
  <img src="04-articles-of-china.png" alt="04-articles-of-china" loading="lazy">
  <figcaption><span class="id">04-articles-of-china</span><br>Talbot stacks four shelves into a literal grid, and mirrors each shelf&#x27;s china around a center-line specimen — the still-life turned into a catalogue.</figcaption>
</figure>
<figure>
  <img src="05-the-ladder.png" alt="05-the-ladder" loading="lazy">
  <figcaption><span class="id">05-the-ladder</span><br>A leaning ladder threads three men into a single stepped diagonal that cuts across an otherwise mirror-symmetric, flat facade.</figcaption>
</figure>
<figure>
  <img src="06-nelsons-column.png" alt="06-nelsons-column" loading="lazy">
  <figcaption><span class="id">06-nelsons-column</span><br>A timber derrick cages the column mid-erection, its raking shores squaring off against the shaft&#x27;s fluted vertical so the unfinished monument reads as pure construction geometry against open sky.</figcaption>
</figure>
<figure>
  <img src="07-scene-in-library.png" alt="07-scene-in-library" loading="lazy">
  <figcaption><span class="id">07-scene-in-library</span><br>A shelf of bindings becomes a taxonomic grid -- dense, legible verticals repeated (a matching trio twice over) against the shelf&#x27;s own edge, with one leaning cluster of pamphlets the sole break in the rhythm, an ancestor of Blossfeldt&#x27;s and Ruscha&#x27;s typological arrays.</figcaption>
</figure>
<figure>
  <img src="08-leaf-of-a-plant.png" alt="08-leaf-of-a-plant" loading="lazy">
  <figcaption><span class="id">08-leaf-of-a-plant</span><br>The leaf is its own printing plate: laid flat and contact-printed, the frond centers itself on its own stem axis inside the mount&#x27;s ruled window, structure alone -- no lens, no framing -- supplying the composition.</figcaption>
</figure>
<figure>
  <img src="09-lacock-abbey-wiltshire.png" alt="09-lacock-abbey-wiltshire" loading="lazy">
  <figcaption><span class="id">09-lacock-abbey-wiltshire</span><br>Talbot squares his camera dead-level on his own Gothic house, letting a tree screen and an eroded foreground bank frame a view still enough to mirror the tower in the water below.</figcaption>
</figure>
<figure>
  <img src="10-bust-of-patroclus.png" alt="10-bust-of-patroclus" loading="lazy">
  <figcaption><span class="id">10-bust-of-patroclus</span><br>Held near-centered on its own bilateral axis within the printed frame, the bust&#x27;s volume is carried entirely by raking light rather than by outline.</figcaption>
</figure>
<figure>
  <img src="11-boulevards-at-paris.png" alt="11-boulevards-at-paris" loading="lazy">
  <figcaption><span class="id">11-boulevards-at-paris</span><br>Two matched rows of building facades recede in one-point perspective to a shared vanishing point marked by the lone boulevard tree, Talbot&#x27;s earliest urban depth study.</figcaption>
</figure>
<figure>
  <img src="12-bridge-of-orleans.png" alt="12-bridge-of-orleans" loading="lazy">
  <figcaption><span class="id">12-bridge-of-orleans</span><br>The bridge&#x27;s repeated arches form a steady horizontal band low in the frame, with the cathedral&#x27;s towers as the single vertical accent against wide open sky and river.</figcaption>
</figure>
