<h1><span class="c">/* </span>walker-evans - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-allie-mae-burroughs.png" alt="01-allie-mae-burroughs" loading="lazy">
  <figcaption><span class="id">01-allie-mae-burroughs</span><br>A frontal portrait built on a vertical mirror axis: the face centered on the spine of the frame, set against the flat horizontal banding of the clapboard wall.</figcaption>
</figure>
<figure>
  <img src="02-floyd-burroughs.png" alt="02-floyd-burroughs" loading="lazy">
  <figcaption><span class="id">02-floyd-burroughs</span><br>A frontal tenant-farmer portrait built on a vertical mirror axis: the weathered face centered on the spine of the frame, wedged between the dark doorway void at left and the raw timber doorframe post at right.</figcaption>
</figure>
<figure>
  <img src="03-bud-fields-family.png" alt="03-bud-fields-family" loading="lazy">
  <figcaption><span class="id">03-bud-fields-family</span><br>A flattened frontal frieze: six faces line up in a shallow register across the plane, the group balanced on a central vertical through Bud and the child seated dead-center at its base.</figcaption>
</figure>
<figure>
  <img src="04-fireplace-wall-burroughs.png" alt="04-fireplace-wall-burroughs" loading="lazy">
  <figcaption><span class="id">04-fireplace-wall-burroughs</span><br>The wall is the picture plane: a bilaterally symmetric fireplace banded by strong horizontals, its tacked calendar and pictures read as a flat frontal grid of rectangles.</figcaption>
</figure>
<figure>
  <img src="05-roadside-stand-birmingham.png" alt="05-roadside-stand-birmingham" loading="lazy">
  <figcaption><span class="id">05-roadside-stand-birmingham</span><br>Dead-frontal facade: hand-lettered signs stack into typographic rectangles that mirror across a central axis beneath a ruler-flat roofline.</figcaption>
</figure>
<figure>
  <img src="06-penny-picture-display-savannah.png" alt="06-penny-picture-display-savannah" loading="lazy">
  <figcaption><span class="id">06-penny-picture-display-savannah</span><br>An all-over grid of grids: identical studio-portrait panels tile the frame with no horizon or depth, the whole field mirrored on a central vertical axis, and the only break in the uniform typology is the applied STUDIO lettering banded across the middle.</figcaption>
</figure>
<figure>
  <img src="07-bethlehem-graveyard-steel-mill.png" alt="07-bethlehem-graveyard-steel-mill" loading="lazy">
  <figcaption><span class="id">07-bethlehem-graveyard-steel-mill</span><br>Three stacked registers - a white grave cross in front, brick row houses, and the steel mill&#x27;s furnaces and stacks behind - the living town wedged between the dead and the works.</figcaption>
</figure>
<figure>
  <img src="08-negro-church-south-carolina.png" alt="08-negro-church-south-carolina" loading="lazy">
  <figcaption><span class="id">08-negro-church-south-carolina</span><br>A dead-frontal church built on a vertical mirror axis: cupola, gable peak, transom and central door stack on the spine while the twin roof pitches converge on that axis, twin gothic windows mirroring left and right.</figcaption>
</figure>
<figure>
  <img src="09-frame-houses-new-orleans.png" alt="09-frame-houses-new-orleans" loading="lazy">
  <figcaption><span class="id">09-frame-houses-new-orleans</span><br>Frontal facades read as a flat frieze: the porch columns beat a repeated vertical rhythm across three near-identical houses, squared to the picture plane above the horizontal curb.</figcaption>
</figure>
<figure>
  <img src="10-frame-houses-fredericksburg.png" alt="10-frame-houses-fredericksburg" loading="lazy">
  <figcaption><span class="id">10-frame-houses-fredericksburg</span><br>Four near-identical frame houses march along a low common baseline as serial rhythm, dwarfed by an empty sky that a lone pole punctuates and a wire slashes.</figcaption>
</figure>
<figure>
  <img src="11-company-houses-birmingham.png" alt="11-company-houses-birmingham" loading="lazy">
  <figcaption><span class="id">11-company-houses-birmingham</span><br>Identical hip-roof company houses march in diminishing repetition from the looming near house at right; converging roof ridges and sill lines pinch toward a vanishing point off the left edge, regimenting industrial labor housing into pure receding perspective.</figcaption>
</figure>
