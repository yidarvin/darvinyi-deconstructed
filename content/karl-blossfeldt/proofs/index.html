<h1><span class="c">/* </span>karl-blossfeldt - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-aristolochia-clematitis.png" alt="01-aristolochia-clematitis" loading="lazy">
  <figcaption><span class="id">01-aristolochia-clematitis</span><br>Bilateral specimen: two mirrored coiling stems flank a central vertical axis, with a tendril-coil crozier below.</figcaption>
</figure>
<figure>
  <img src="02-equisetum-hyemale.png" alt="02-equisetum-hyemale" loading="lazy">
  <figcaption><span class="id">02-equisetum-hyemale</span><br>A jointed stem in strict bilateral symmetry: fluted segments stacked like a column and crowned by a terminal spore cone.</figcaption>
</figure>
<figure>
  <img src="03-adiantum-pedatum.png" alt="03-adiantum-pedatum" loading="lazy">
  <figcaption><span class="id">03-adiantum-pedatum</span><br>Six fern croziers repeat the logarithmic spiral, rising on S-curving stems from a common base; detector horizon and vanishing point are background false positives, dropped.</figcaption>
</figure>
<figure>
  <img src="04-impatiens-glandulifera.png" alt="04-impatiens-glandulifera" loading="lazy">
  <figcaption><span class="id">04-impatiens-glandulifera</span><br>Impatiens as wrought-iron candelabra: a vertical spine (bilateral symmetry) carrying modular whorls of opposite, undulating branches mirrored top-to-bottom.</figcaption>
</figure>
<figure>
  <img src="05-acanthus-mollis.png" alt="05-acanthus-mollis" loading="lazy">
  <figcaption><span class="id">05-acanthus-mollis</span><br>Bilateral mirror symmetry about the central axis; identical spiny bract modules stacked in rhythmic vertical repetition.</figcaption>
</figure>
<figure>
  <img src="06-cucurbita.png" alt="06-cucurbita" loading="lazy">
  <figcaption><span class="id">06-cucurbita</span><br>A straight vertical stem disciplines tendrils that coil off in every direction: a tight logarithmic spiral lower-left, a bright-eyed loop upper-right, a loose loop upper-left.</figcaption>
</figure>
<figure>
  <img src="07-dipsacus-laciniatus.png" alt="07-dipsacus-laciniatus" loading="lazy">
  <figcaption><span class="id">07-dipsacus-laciniatus</span><br>Central stem is the mirror line: two thorn-edged bracts inroll into crozier coils that answer each other across the bilateral axis.</figcaption>
</figure>
<figure>
  <img src="08-blumenbachia-hieronymi.png" alt="08-blumenbachia-hieronymi" loading="lazy">
  <figcaption><span class="id">08-blumenbachia-hieronymi</span><br>A pendant seed capsule hung from its pedicel: bilaterally symmetric about the central axis, its ribbed surface twisting in a spiral.</figcaption>
</figure>
<figure>
  <img src="09-allium-ostrowskianum.png" alt="09-allium-ostrowskianum" loading="lazy">
  <figcaption><span class="id">09-allium-ostrowskianum</span><br>Bilateral mirror symmetry: one vertical stem rises to a ribbed capsule that opens into a broad radial umbel of buds.</figcaption>
</figure>
<figure>
  <img src="10-aesculus-parviflora.png" alt="10-aesculus-parviflora" loading="lazy">
  <figcaption><span class="id">10-aesculus-parviflora</span><br>Comparative plate: three parallel specimens in serial rhythm, each a bilaterally symmetric bud-head crowning a node-ringed stem.</figcaption>
</figure>
<figure>
  <img src="11-papaver-orientale.png" alt="11-papaver-orientale" loading="lazy">
  <figcaption><span class="id">11-papaver-orientale</span><br>A bilaterally symmetric poppy capsule: a fluted radial crown bursts atop an ovoid urn, all organized on one vertical spine.</figcaption>
</figure>
<figure>
  <img src="12-seseli-gummiferum.png" alt="12-seseli-gummiferum" loading="lazy">
  <figcaption><span class="id">12-seseli-gummiferum</span><br>A fluted trunk on the vertical axis forks symmetrically and erupts into a crown of pointed buds — botany rendered as architecture.</figcaption>
</figure>
