<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stephen Shore — overlay proofs</title>
  <style>
    body { margin: 24px; background: #111827; color: #e5e7eb; font: 14px/1.4 system-ui, sans-serif; }
    h1 { margin: 0 0 20px; font-size: 20px; }
    main { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; }
    figure { margin: 0; }
    img { display: block; width: 100%; height: auto; border: 1px solid #374151; }
    figcaption { margin-top: 6px; color: #9ca3af; }
  </style>
</head>
<body>
  <h1>Stephen Shore — overlay proofs</h1>
  <main>
    <figure><img src="01-holden-st-north-adams-1974.png" alt="Holden St. overlay proof"><figcaption>Holden St., North Adams, Massachusetts</figcaption></figure>
    <figure><img src="02-us-10-post-falls-1974.png" alt="U.S. 10 overlay proof"><figcaption>U.S. 10, Post Falls, Idaho</figcaption></figure>
    <figure><img src="03-us-93-kingman-1975.png" alt="U.S. 93 overlay proof"><figcaption>U.S. 93, Kingman, Arizona</figcaption></figure>
    <figure><img src="04-el-paso-st-el-paso-1975.png" alt="El Paso St. overlay proof"><figcaption>El Paso St., El Paso, Texas</figcaption></figure>
    <figure><img src="05-m-half-ave-galveston-1975.png" alt="M 1/2 Ave. overlay proof"><figcaption>M 1/2 Ave., Galveston, Texas</figcaption></figure>
    <figure><img src="06-alley-off-sunset-strip-1975.png" alt="Alley off Sunset Strip overlay proof"><figcaption>Alley off Sunset Strip, Hollywood, California</figcaption></figure>
    <figure><img src="07-meeting-st-charleston-1975.png" alt="Meeting St. overlay proof"><figcaption>Meeting St., Charleston, South Carolina</figcaption></figure>
    <figure><img src="08-second-street-east-kalispell-1974.png" alt="Second Street East overlay proof"><figcaption>Second Street East &amp; South Main Street, Kalispell, Montana</figcaption></figure>
    <figure><img src="09-bay-theater-ashland-1973.png" alt="Bay Theater overlay proof"><figcaption>Bay Theater, Ashland, Wisconsin</figcaption></figure>
    <figure><img src="10-church-street-easton-1974.png" alt="Church Street overlay proof"><figcaption>Church Street &amp; Second Street, Easton, Pennsylvania</figcaption></figure>
  </main>
</body>
</html>
