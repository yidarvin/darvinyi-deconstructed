<h1><span class="c">/* </span>timothy-osullivan - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-harvest-of-death.png" alt="01-harvest-of-death" loading="lazy">
  <figcaption><span class="id">01-harvest-of-death</span><br>The fallen are laid out as a receding diagonal row across a stripped field, flattened beneath a low hazy horizon, while mounted officers stand unhurt at the vanishing point of that row.</figcaption>
</figure>
<figure>
  <img src="02-council-of-war.png" alt="02-council-of-war" loading="lazy">
  <figcaption><span class="id">02-council-of-war</span><br>The upper-gallery vantage rakes across pews, staff, and tree to collapse near and far into one oblique diagonal field, not a level tableau.</figcaption>
</figure>
<figure>
  <img src="03-ancient-ruins-chelle.png" alt="03-ancient-ruins-chelle" loading="lazy">
  <figcaption><span class="id">03-ancient-ruins-chelle</span><br>The towering diagonally-streaked sandstone dwarfs the cliff dwelling into a thin masonry seam tucked in its shadowed niche, with a second ruin below repeating the theme: geology overwhelms architecture in scale.</figcaption>
</figure>
<figure>
  <img src="04-black-canon.png" alt="04-black-canon" loading="lazy">
  <figcaption><span class="id">04-black-canon</span><br>The grounded boat is the only scale marker against the Black Canon&#x27;s mirror-symmetric walls, which converge along the frame&#x27;s center toward a small notch of daylight.</figcaption>
</figure>
<figure>
  <img src="05-sand-dunes.png" alt="05-sand-dunes" loading="lazy">
  <figcaption><span class="id">05-sand-dunes</span><br>A wagon and its own tracks are the only measure of scale O&#x27;Sullivan gives an otherwise featureless dune field.</figcaption>
</figure>
<figure>
  <img src="06-tufa-domes.png" alt="06-tufa-domes" loading="lazy">
  <figcaption><span class="id">06-tufa-domes</span><br>A near-identical row of tufa domes recedes across the still water toward the massive terminal Pyramid Rock, diminishing scale standing in as a measure of geologic time.</figcaption>
</figure>
<figure>
  <img src="07-fissure-vent.png" alt="07-fissure-vent" loading="lazy">
  <figcaption><span class="id">07-fissure-vent</span><br>A ground fissure leads the eye straight into its own vent, where a survey member&#x27;s silhouette dissolves into the same steam meant to give the flat basin scale.</figcaption>
</figure>
<figure>
  <img src="08-inscription-rock.png" alt="08-inscription-rock" loading="lazy">
  <figcaption><span class="id">08-inscription-rock</span><br>O&#x27;Sullivan shoots the rock face dead-on like a page to be copied, framing the inscription for legibility and letting only the scale rule and a stray yucca admit a camera, not a scribe, made this copy.</figcaption>
</figure>
<figure>
  <img src="09-vermilion-creek.png" alt="09-vermilion-creek" loading="lazy">
  <figcaption><span class="id">09-vermilion-creek</span><br>Two near-mirrored canyon walls funnel the eye down Vermilion Creek to a vanishing point swallowed in distant haze.</figcaption>
</figure>
<figure>
  <img src="10-shoshone-falls.png" alt="10-shoshone-falls" loading="lazy">
  <figcaption><span class="id">10-shoshone-falls</span><br>A flat-topped mesa rides the skyline directly above the brink where the river shatters into an edge-to-edge curtain, the whole scene held in near-mirror symmetry between two black basalt walls.</figcaption>
</figure>
<figure>
  <img src="11-zuni-mission.png" alt="11-zuni-mission" loading="lazy">
  <figcaption><span class="id">11-zuni-mission</span><br>The ruined adobe mission sits slightly left of center against the pueblo&#x27;s stacked terraces, its weathered silhouette read as another eroding landform, while a worn wagon-rut ditch draws the eye in from an all-but-empty foreground.</figcaption>
</figure>
