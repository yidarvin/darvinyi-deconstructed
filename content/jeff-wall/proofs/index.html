<h1><span class="c">/* </span>jeff-wall - proofs<span class="c"> */</span></h1>
<p class="sub">10 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-the-destroyed-room.png" alt="01-the-destroyed-room" loading="lazy">
  <figcaption><span class="id">01-the-destroyed-room</span><br>The room&#x27;s broken edges turn domestic wreckage into a deliberately staged set of receding and opposing diagonals.</figcaption>
</figure>
<figure>
  <img src="02-picture-for-women.png" alt="02-picture-for-women" loading="lazy">
  <figcaption><span class="id">02-picture-for-women</span><br>A camera on the mirror axis makes the photographer, model, and viewer part of one reciprocal arrangement.</figcaption>
</figure>
<figure>
  <img src="03-mimic.png" alt="03-mimic" loading="lazy">
  <figcaption><span class="id">03-mimic</span><br>The sidewalk&#x27;s recession keeps a charged three-person encounter visibly connected to the wider street.</figcaption>
</figure>
<figure>
  <img src="04-diatribe.png" alt="04-diatribe" loading="lazy">
  <figcaption><span class="id">04-diatribe</span><br>A small family group is held to one side of an exposed threshold and its converging track.</figcaption>
</figure>
<figure>
  <img src="05-the-well.png" alt="05-the-well" loading="lazy">
  <figcaption><span class="id">05-the-well</span><br>The high view converts a simple act of digging into a tight relation between a body, a tool, and a deep void.</figcaption>
</figure>
<figure>
  <img src="06-a-sudden-gust-of-wind.png" alt="06-a-sudden-gust-of-wind" loading="lazy">
  <figcaption><span class="id">06-a-sudden-gust-of-wind</span><br>Bodies, papers, tree, and canal carry a single gust diagonally across an otherwise open panorama.</figcaption>
</figure>
<figure>
  <img src="07-rear-view-open-air-theatre.png" alt="07-rear-view-open-air-theatre" loading="lazy">
  <figcaption><span class="id">07-rear-view-open-air-theatre</span><br>The curved theatre roof gives a street-side building portrait the enclosed scale of a constructed stage.</figcaption>
</figure>
<figure>
  <img src="08-dressing-poultry.png" alt="08-dressing-poultry" loading="lazy">
  <figcaption><span class="id">08-dressing-poultry</span><br>A crowded worktable gathers separate gestures into a shallow but active interior tableau.</figcaption>
</figure>
<figure>
  <img src="09-knife-throw.png" alt="09-knife-throw" loading="lazy">
  <figcaption><span class="id">09-knife-throw</span><br>A raised arm sends a small, uncertain trajectory across a deliberately broad field of empty workshop wall.</figcaption>
</figure>
<figure>
  <img src="10-mother-of-pearl.png" alt="10-mother-of-pearl" loading="lazy">
  <figcaption><span class="id">10-mother-of-pearl</span><br>A child, a tabletop, and reflective shells make attention travel through a compact domestic arrangement.</figcaption>
</figure>
