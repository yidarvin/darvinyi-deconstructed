<h1><span class="c">/* </span>gustave-le-gray - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-great-wave-sete.png" alt="01-great-wave-sete" loading="lazy">
  <figcaption><span class="id">01-great-wave-sete</span><br>A dead-level horizon gives sea and sky separate tonal registers from Le Gray&#x27;s combination printing, and the near-mirrored cloud masses are broken only by the sun&#x27;s glow drifting right of center and the wave crashing over the rocks below.</figcaption>
</figure>
<figure>
  <img src="02-brig-on-water.png" alt="02-brig-on-water" loading="lazy">
  <figcaption><span class="id">02-brig-on-water</span><br>A single becalmed brig, reduced to pure silhouette, sits off-center just under a horizon that falls almost exactly on the lower third, isolated by the sea&#x27;s broad reflected glare.</figcaption>
</figure>
<figure>
  <img src="03-mediterranean-mount-agde.png" alt="03-mediterranean-mount-agde" loading="lazy">
  <figcaption><span class="id">03-mediterranean-mount-agde</span><br>A dead-level combination-print horizon holds flat sea against flat sky, broken only by Mount Agde&#x27;s lone silhouette and a nearer headland at the frame&#x27;s edge.</figcaption>
</figure>
<figure>
  <img src="04-french-english-fleets-cherbourg.png" alt="04-french-english-fleets-cherbourg" loading="lazy">
  <figcaption><span class="id">04-french-english-fleets-cherbourg</span><br>The same sky-and-sea discipline as Le Gray&#x27;s solo seascapes, scaled up to hold a whole scattered fleet along one uneven horizon band.</figcaption>
</figure>
<figure>
  <img src="05-reine-hortense-yacht-havre.png" alt="05-reine-hortense-yacht-havre" loading="lazy">
  <figcaption><span class="id">05-reine-hortense-yacht-havre</span><br>A court commission handled with the same reductive marine geometry as Le Gray&#x27;s own seascapes: flat waterline, hull set on the diagonal, mast driven straight up against a soft reflected sky.</figcaption>
</figure>
<figure>
  <img src="06-tree-study-fontainebleau.png" alt="06-tree-study-fontainebleau" loading="lazy">
  <figcaption><span class="id">06-tree-study-fontainebleau</span><br>The tree and its understory stand alone in the frame, ringed by open clearing and haze rather than forest clutter -- figure against void.</figcaption>
</figure>
<figure>
  <img src="07-oak-tree-rocks-fontainebleau.png" alt="07-oak-tree-rocks-fontainebleau" loading="lazy">
  <figcaption><span class="id">07-oak-tree-rocks-fontainebleau</span><br>A forked oak radiates branches to every edge while twin boulders seal the base, packing the frame solid edge to edge with barely a gap of sky -- the dense early manner Le Gray later spared down.</figcaption>
</figure>
<figure>
  <img src="08-hollow-oak-tree-fontainebleau.png" alt="08-hollow-oak-tree-fontainebleau" loading="lazy">
  <figcaption><span class="id">08-hollow-oak-tree-fontainebleau</span><br>The ancient oak is planted dead center on the vertical axis, its gnarled trunk swelling into a single sculptural mass with the hollow that names it read as a dark aperture at its base.</figcaption>
</figure>
<figure>
  <img src="09-fontainebleau-sandy-path.png" alt="09-fontainebleau-sandy-path" loading="lazy">
  <figcaption><span class="id">09-fontainebleau-sandy-path</span><br>The sandy path is a single leading line pulling the eye up and right into the wood, framed on all sides by the arching canopy and the dark oak trunk.</figcaption>
</figure>
<figure>
  <img src="10-ramparts-of-carcassonne.png" alt="10-ramparts-of-carcassonne" loading="lazy">
  <figcaption><span class="id">10-ramparts-of-carcassonne</span><br>The curtain wall is read frontally as stacked horizontal courses of stone, climaxing in the drum tower&#x27;s rounded mass -- the same planar, banded geometry Le Gray built his seascapes from.</figcaption>
</figure>
<figure>
  <img src="11-cloud-study.png" alt="11-cloud-study" loading="lazy">
  <figcaption><span class="id">11-cloud-study</span><br>The cloud&#x27;s own jagged mass, not the sea below it, is the subject -- its sunlit breach anchors the frame and the light falls straight down to a glint on the water, exactly the raw material Le Gray banked for combination printing.</figcaption>
</figure>
<figure>
  <img src="12-cavalry-camp-chalons.png" alt="12-cavalry-camp-chalons" loading="lazy">
  <figcaption><span class="id">12-cavalry-camp-chalons</span><br>Depth is built by repetition and diminishing scale of cavalry ranks strung along the horizon, not by a still horizon itself.</figcaption>
</figure>
</div>
