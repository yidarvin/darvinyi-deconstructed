<h1><span class="c">/* </span>annie-leibovitz - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-queen-elizabeth-ii.png" alt="01-queen-elizabeth-ii" loading="lazy">
  <figcaption><span class="id">01-queen-elizabeth-ii</span><br>The Queen&#x27;s small bright figure is held between the deep mirror-cabinet field and the wide foreground carpet.</figcaption>
</figure>
<figure>
  <img src="02-john-lennon-yoko-ono.png" alt="02-john-lennon-yoko-ono" loading="lazy">
  <figcaption><span class="id">02-john-lennon-yoko-ono</span><br>The tightly curled pair is made into one unstable, tender shape against an open pale ground.</figcaption>
</figure>
<figure>
  <img src="03-whoopi-goldberg.png" alt="03-whoopi-goldberg" loading="lazy">
  <figcaption><span class="id">03-whoopi-goldberg</span><br>A nearly empty high-key bath makes face, limbs, and white enclosure read as a single graphic construction.</figcaption>
</figure>
<figure>
  <img src="04-meryl-streep.png" alt="04-meryl-streep" loading="lazy">
  <figcaption><span class="id">04-meryl-streep</span><br>A centered white face and doubled hand gesture make theatrical attention out of an otherwise dark field.</figcaption>
</figure>
<figure>
  <img src="05-r2-d2.png" alt="05-r2-d2" loading="lazy">
  <figcaption><span class="id">05-r2-d2</span><br>The crate turns a familiar character into a small centered subject inside a practical industrial frame.</figcaption>
</figure>
<figure>
  <img src="06-keith-haring.png" alt="06-keith-haring" loading="lazy">
  <figcaption><span class="id">06-keith-haring</span><br>The body is read inside, and partly absorbed by, the mural&#x27;s dense all-over black line.</figcaption>
</figure>
<figure>
  <img src="07-cindy-crawford.png" alt="07-cindy-crawford" loading="lazy">
  <figcaption><span class="id">07-cindy-crawford</span><br>The small pale figure is suspended as a narrow vertical against a dense dark field.</figcaption>
</figure>
<figure>
  <img src="08-dan-aykroyd-john-belushi.png" alt="08-dan-aykroyd-john-belushi" loading="lazy">
  <figcaption><span class="id">08-dan-aykroyd-john-belushi</span><br>Blue faces, black hats, and paired suits make two performers read as one deliberately manufactured unit.</figcaption>
</figure>
<figure>
  <img src="09-bruce-springsteen.png" alt="09-bruce-springsteen" loading="lazy">
  <figcaption><span class="id">09-bruce-springsteen</span><br>Guitar, reaching arm, and paper-covered table make the offstage portrait feel like an interrupted working moment.</figcaption>
</figure>
<figure>
  <img src="10-patti-smith.png" alt="10-patti-smith" loading="lazy">
  <figcaption><span class="id">10-patti-smith</span><br>A figure and hanging drapery rise against fire, while the film-strip edge turns the staging into a frame within the frame.</figcaption>
</figure>
<figure>
  <img src="11-john-lennon-new-york.png" alt="11-john-lennon-new-york" loading="lazy">
  <figcaption><span class="id">11-john-lennon-new-york</span><br>A close frontal face sits inside the visible print border, while the guitar strap keeps the vertical portrait from becoming static.</figcaption>
</figure>
