<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>saul-leiter - proofs</title>
<style>
  :root { color-scheme: dark; }
  body { background:#0a0e0f; color:#e6edf0; font-family:"JetBrains Mono",ui-monospace,monospace; margin:0; padding:2rem; }
  h1 { font-size:1rem; font-weight:700; letter-spacing:.02em; }
  h1 .c { color:#55707b; }
  p.sub { color:#7d919b; font-size:.8rem; margin-top:-.3rem; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.25rem; margin-top:1.5rem; }
  figure { margin:0; border:1px solid #1e2a30; border-radius:.5rem; background:#10171a; padding:.6rem; }
  figure img { width:100%; height:auto; display:block; border-radius:.25rem; background:#000; }
  figcaption { margin-top:.5rem; font-size:.72rem; color:#7d919b; line-height:1.4; }
  figcaption .id { color:#2dd4bf; }
</style>
</head>
<body>
<h1><span class="c">/* </span>saul-leiter - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-red-curtain.png" alt="01-red-curtain" loading="lazy">
  <figcaption><span class="id">01-red-curtain</span><br>A passerby is held in a pale upper street while the red foreground screen opens a second, unstable reflection below.</figcaption>
</figure>
<figure>
  <img src="02-canopy.png" alt="02-canopy" loading="lazy">
  <figcaption><span class="id">02-canopy</span><br>The immense dark canopy makes the snowy street a compressed aperture, with the curb slipping diagonally through it.</figcaption>
</figure>
<figure>
  <img src="03-foot-on-el.png" alt="03-foot-on-el" loading="lazy">
  <figcaption><span class="id">03-foot-on-el</span><br>The seat back and floorboards build a near-abstract structure; the cropped shoe breaks it with a human fragment.</figcaption>
</figure>
<figure>
  <img src="04-graffiti-heads.png" alt="04-graffiti-heads" loading="lazy">
  <figcaption><span class="id">04-graffiti-heads</span><br>Painted faces occupy the same reflected field as the architecture, delaying any clean distinction between mark and subject.</figcaption>
</figure>
<figure>
  <img src="05-cracks.png" alt="05-cracks" loading="lazy">
  <figcaption><span class="id">05-cracks</span><br>The glass surface becomes the primary drawing, keeping the distant figures behind a network of interruptions.</figcaption>
</figure>
<figure>
  <img src="06-taxi.png" alt="06-taxi" loading="lazy">
  <figcaption><span class="id">06-taxi</span><br>The taxi is read as layered red, yellow, and black fields before its driver and steering wheel resolve as a scene.</figcaption>
</figure>
<figure>
  <img src="07-mirrors.png" alt="07-mirrors" loading="lazy">
  <figcaption><span class="id">07-mirrors</span><br>Three mirrors segment the street into competing reflections, making the red-coated figure appear only after the display is read.</figcaption>
</figure>
<figure>
  <img src="08-phone-call.png" alt="08-phone-call" loading="lazy">
  <figcaption><span class="id">08-phone-call</span><br>Window bars and reflections partition the telephone gesture into a gridded urban tableau.</figcaption>
</figure>
<figure>
  <img src="09-bus.png" alt="09-bus" loading="lazy">
  <figcaption><span class="id">09-bus</span><br>The bus window isolates a passenger while the red body and wheel arch turn the vehicle into a stack of graphic zones.</figcaption>
</figure>
<figure>
  <img src="10-snow.png" alt="10-snow" loading="lazy">
  <figcaption><span class="id">10-snow</span><br>Condensation and snow reduce the street to a figure, a yellow field, and downward-running marks on the glass.</figcaption>
</figure>
<figure>
  <img src="11-through-boards.png" alt="11-through-boards" loading="lazy">
  <figcaption><span class="id">11-through-boards</span><br>Dark boards withhold almost everything; the thin horizontal opening becomes a precise stage for cars and walkers.</figcaption>
</figure>
<figure>
  <img src="12-walking.png" alt="12-walking" loading="lazy">
  <figcaption><span class="id">12-walking</span><br>A dark passing figure is slowed by translucent verticals, glass seams, and a pale lower reflection.</figcaption>
</figure>
</div>
</body>
</html>
