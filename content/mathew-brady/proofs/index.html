<h1><span class="c">/* </span>mathew-brady - proofs<span class="c"> */</span></h1>
<p class="sub">10 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-john-calhoun.png" alt="01-john-calhoun" loading="lazy">
  <figcaption><span class="id">01-john-calhoun</span><br>A daguerreotype built from stillness: the head&#x27;s pale mass and the folded hands, its only prop, sit on a symmetrical frontal axis while a single cloak fold cuts the dark field.</figcaption>
</figure>
<figure>
  <img src="02-matthew-perry.png" alt="02-matthew-perry" loading="lazy">
  <figcaption><span class="id">02-matthew-perry</span><br>Face and epaulette split the golden-section verticals -- Brady&#x27;s studio formula reads likeness and naval rank as equal anchors, squared by the double button row.</figcaption>
</figure>
<figure>
  <img src="03-cooper-union-lincoln.png" alt="03-cooper-union-lincoln" loading="lazy">
  <figcaption><span class="id">03-cooper-union-lincoln</span><br>Brady&#x27;s standard campaign formula: a steadied gaze, an arm that carries the eye down to the hand resting on law books, staged beside a classical column for institutional weight.</figcaption>
</figure>
<figure>
  <img src="04-winfield-scott.png" alt="04-winfield-scott" loading="lazy">
  <figcaption><span class="id">04-winfield-scott</span><br>A mass-produced wartime CDV: bust portrait, printed signature caption, and rule border all locked to one centered axis -- the studio formula, not a composed scene.</figcaption>
</figure>
<figure>
  <img src="05-brady-returned-bull-run.png" alt="05-brady-returned-bull-run" loading="lazy">
  <figcaption><span class="id">05-brady-returned-bull-run</span><br>The house frontal-and-prop formula drops away when Brady turns the camera on himself: no column or book-stack, just a plain grounded field and a profile caught mid-stride, gaze cutting into the empty space he&#x27;d normally fill with a sitter.</figcaption>
</figure>
<figure>
  <img src="06-walt-whitman.png" alt="06-walt-whitman" loading="lazy">
  <figcaption><span class="id">06-walt-whitman</span><br>Brady&#x27;s symmetric, centered bust-portrait formula holds the studio grammar steady while Whitman&#x27;s eyes break it, gazing past the lens rather than into it.</figcaption>
</figure>
<figure>
  <img src="07-william-sherman.png" alt="07-william-sherman" loading="lazy">
  <figcaption><span class="id">07-william-sherman</span><br>Brady&#x27;s standardized bust-portrait formula holds Sherman dead-center and frontal, the same rig used on Grant, Lee, and Scott, but his gaze breaks off past the lens rather than meeting it.</figcaption>
</figure>
<figure>
  <img src="08-grant-cold-harbor.png" alt="08-grant-cold-harbor" loading="lazy">
  <figcaption><span class="id">08-grant-cold-harbor</span><br>A studio portrait relocated to a working camp: rope-bound pine substitutes for a column and tent canvas for a backdrop, while Grant&#x27;s hand-on-hip pose still performs Brady&#x27;s indoor grammar outdoors.</figcaption>
</figure>
<figure>
  <img src="09-photo-outfit-petersburg.png" alt="09-photo-outfit-petersburg" loading="lazy">
  <figcaption><span class="id">09-photo-outfit-petersburg</span><br>The darkroom wagon becomes the subject only once you find the crate stenciled BRADY&#x27;S at its center, framed by a proscenium of pine trunks with an improvised lean-to tent proving the scene unposed.</figcaption>
</figure>
<figure>
  <img src="10-robert-e-lee-staff.png" alt="10-robert-e-lee-staff" loading="lazy">
  <figcaption><span class="id">10-robert-e-lee-staff</span><br>Lee seated at the apex of a triangle formed by his flanking aides&#x27; heads, their resting hands converging back down on him.</figcaption>
</figure>
