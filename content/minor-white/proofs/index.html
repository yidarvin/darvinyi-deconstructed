<body>
<h1><span class="c">/* </span>minor-white - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-portland-1938.png" alt="01-portland-1938" loading="lazy">
  <figcaption><span class="id">01-portland-1938</span><br>A rigid facade and bridge rail compress incidental figures into a shallow public stage.</figcaption>
</figure>
<figure>
  <img src="02-water-street-portland.png" alt="02-water-street-portland" loading="lazy">
  <figcaption><span class="id">02-water-street-portland</span><br>Wires and rooflines make a deep street while the plant silhouettes hold its center.</figcaption>
</figure>
<figure>
  <img src="03-navarro-river-california.png" alt="03-navarro-river-california" loading="lazy">
  <figcaption><span class="id">03-navarro-river-california</span><br>A dark field turns roots and pale upright forms into an unstable natural abstraction.</figcaption>
</figure>
<figure>
  <img src="04-jackson-california.png" alt="04-jackson-california" loading="lazy">
  <figcaption><span class="id">04-jackson-california</span><br>A cross and dark verticals turn a cemetery view into a severe, uneven rhythm.</figcaption>
</figure>
<figure>
  <img src="05-sandblaster-san-francisco.png" alt="05-sandblaster-san-francisco" loading="lazy">
  <figcaption><span class="id">05-sandblaster-san-francisco</span><br>A worker&#x27;s curved back is enclosed by excavation, with one bright foreground interruption.</figcaption>
</figure>
<figure>
  <img src="06-mission-district-san-francisco.png" alt="06-mission-district-san-francisco" loading="lazy">
  <figcaption><span class="id">06-mission-district-san-francisco</span><br>A wet alley narrows toward a child while house edges make the ordinary space feel threshold-like.</figcaption>
</figure>
<figure>
  <img src="07-golden-gate-bridge-san-francisco.png" alt="07-golden-gate-bridge-san-francisco" loading="lazy">
  <figcaption><span class="id">07-golden-gate-bridge-san-francisco</span><br>The bridge is a small structural counterweight beneath an expansive, directional cloud.</figcaption>
</figure>
<figure>
  <img src="08-windowsill-daydreaming.png" alt="08-windowsill-daydreaming" loading="lazy">
  <figcaption><span class="id">08-windowsill-daydreaming</span><br>Curtain, sill, and a reflected oval make a domestic window behave as a luminous abstraction.</figcaption>
</figure>
<figure>
  <img src="09-frosted-window.png" alt="09-frosted-window" loading="lazy">
  <figcaption><span class="id">09-frosted-window</span><br>Frosted strata make the window an all-over tonal field rather than a view through glass.</figcaption>
</figure>
<figure>
  <img src="10-santa-fe-new-mexico.png" alt="10-santa-fe-new-mexico" loading="lazy">
  <figcaption><span class="id">10-santa-fe-new-mexico</span><br>A seam and a peeling patch create the wall&#x27;s small but decisive internal shift.</figcaption>
</figure>
<figure>
  <img src="11-schoodic-point-maine.png" alt="11-schoodic-point-maine" loading="lazy">
  <figcaption><span class="id">11-schoodic-point-maine</span><br>Rock and water meet in a handful of directional edges and sharply weighted dark pools.</figcaption>
</figure>
</div>
