<h1><span class="c">/* </span>garry-winogrand - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-worlds-fair-new-york-city.png" alt="01-worlds-fair-new-york-city" loading="lazy">
  <figcaption><span class="id">01-worlds-fair-new-york-city</span><br>A bench frieze presses gestures into the lower band while distant walkers make a second, quieter register.</figcaption>
</figure>
<figure>
  <img src="02-american-legion-convention.png" alt="02-american-legion-convention" loading="lazy">
  <figcaption><span class="id">02-american-legion-convention</span><br>A crawling veteran and standing edge figures make competing social zones rather than one centered scene.</figcaption>
</figure>
<figure>
  <img src="03-central-park-zoo.png" alt="03-central-park-zoo" loading="lazy">
  <figcaption><span class="id">03-central-park-zoo</span><br>The adults and chimpanzees form a compact quartet whose mismatched attention opens into the crowd.</figcaption>
</figure>
<figure>
  <img src="04-cape-kennedy-apollo-11.png" alt="04-cape-kennedy-apollo-11" loading="lazy">
  <figcaption><span class="id">04-cape-kennedy-apollo-11</span><br>The spectator wall holds an upward-looking crowd while long shadows pull the eye back to the foreground viewer.</figcaption>
</figure>
<figure>
  <img src="05-hard-hat-rally.png" alt="05-hard-hat-rally" loading="lazy">
  <figcaption><span class="id">05-hard-hat-rally</span><br>Flags, arms, and a microphone collide across the crowd, refusing a stable center.</figcaption>
</figure>
<figure>
  <img src="06-centennial-ball-feather-boa.png" alt="06-centennial-ball-feather-boa" loading="lazy">
  <figcaption><span class="id">06-centennial-ball-feather-boa</span><br>The feathered central figure is made from a tight enclosure of faces, bodies, and cropped interruptions.</figcaption>
</figure>
<figure>
  <img src="07-peace-demonstration-central-park.png" alt="07-peace-demonstration-central-park" loading="lazy">
  <figcaption><span class="id">07-peace-demonstration-central-park</span><br>A bare tree interrupts the horizontal crowd mass and the scattered balloon field above it.</figcaption>
</figure>
<figure>
  <img src="08-new-york-phone-booth.png" alt="08-new-york-phone-booth" loading="lazy">
  <figcaption><span class="id">08-new-york-phone-booth</span><br>The booth edge obstructs its occupant while pedestrians continue on a separate vector.</figcaption>
</figure>
<figure>
  <img src="09-hippy-hollow-lake-travis.png" alt="09-hippy-hollow-lake-travis" loading="lazy">
  <figcaption><span class="id">09-hippy-hollow-lake-travis</span><br>A small figure is screened by trees and shadow, making distance rather than description carry the image.</figcaption>
</figure>
<figure>
  <img src="10-beverly-hills.png" alt="10-beverly-hills" loading="lazy">
  <figcaption><span class="id">10-beverly-hills</span><br>Two bicycles and their shadows ride a pitched sidewalk into a bright, unstable street.</figcaption>
</figure>
<figure>
  <img src="11-venice-california.png" alt="11-venice-california" loading="lazy">
  <figcaption><span class="id">11-venice-california</span><br>A foreground arm blocks the view, but the older woman, bench, and passersby complete a social tableau.</figcaption>
</figure>
<figure>
  <img src="12-new-york-city.png" alt="12-new-york-city" loading="lazy">
  <figcaption><span class="id">12-new-york-city</span><br>A huge cropped arm crosses the children&#x27;s view, turning a gesture into a command over the small scene.</figcaption>
</figure>
