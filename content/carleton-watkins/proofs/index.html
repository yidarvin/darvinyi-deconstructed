<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carleton Watkins overlay proofs</title>
  <style>
    body { margin: 24px; background: #111; color: #eee; font: 14px/1.4 system-ui, sans-serif; }
    main { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; }
    figure { margin: 0; } img { display: block; width: 100%; height: auto; } figcaption { margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Carleton Watkins — overlay proofs</h1>
  <main>
    <figure><img src="01-yosemite-valley-best-general-view.png" alt="Yosemite Valley overlay proof"><figcaption>01 — Yosemite Valley from the Best General View</figcaption></figure>
    <figure><img src="02-el-capitan-tutocanula.png" alt="El Capitan stereocard overlay proof"><figcaption>02 — Tutocanula, or El Capitan</figcaption></figure>
    <figure><img src="03-dams-and-lake-nevada-county.png" alt="Dams and Lake overlay proof"><figcaption>03 — Dams and Lake, Nevada County</figcaption></figure>
    <figure><img src="04-mirror-lake-mount-watkins.png" alt="Mirror Lake overlay proof"><figcaption>04 — Mirror Lake and Mt. Watkins</figcaption></figure>
    <figure><img src="05-multnomah-falls-side.png" alt="Multnomah Falls overlay proof"><figcaption>05 — Multnomah Falls, Side</figcaption></figure>
    <figure><img src="06-view-on-lake-tahoe.png" alt="Lake Tahoe railway overlay proof"><figcaption>06 — View on Lake Tahoe</figcaption></figure>
    <figure><img src="07-among-the-treetops-calaveras.png" alt="Calaveras treetops overlay proof"><figcaption>07 — Among the Treetops, Calaveras Grove</figcaption></figure>
    <figure><img src="09-views-in-los-angeles.png" alt="Los Angeles overlay proof"><figcaption>09 — Views in Los Angeles</figcaption></figure>
    <figure><img src="10-smelting-works-new-almaden.png" alt="New Almaden overlay proof"><figcaption>10 — Smelting Works, New Almaden</figcaption></figure>
  </main>
</body>
</html>
