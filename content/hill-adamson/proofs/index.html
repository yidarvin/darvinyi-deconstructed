<h1><span class="c">/* </span>hill-adamson - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-newhaven-fishwives.png" alt="01-newhaven-fishwives" loading="lazy">
  <figcaption><span class="id">01-newhaven-fishwives</span><br>The standing woman&#x27;s raised creel and the seated woman&#x27;s crossed shawl close the gap between them, fusing two bodies into one triangular silhouette against the plain ground -- the compositional cell Hill repeats across the fishwife series.</figcaption>
</figure>
<figure>
  <img src="02-elizabeth-johnstone-hall.png" alt="02-elizabeth-johnstone-hall" loading="lazy">
  <figcaption><span class="id">02-elizabeth-johnstone-hall</span><br>The striped wrap gathers into a sculptural mass across the lower frame while the plain backdrop isolates her turned profile above it -- volume against void.</figcaption>
</figure>
<figure>
  <img src="03-signing-deed-of-demission.png" alt="03-signing-deed-of-demission" loading="lazy">
  <figcaption><span class="id">03-signing-deed-of-demission</span><br>Dozens of individually lit faces are stacked into one overlapping row around the signing table -- a crowd built like a diagram, the way Hill would later assemble it in paint.</figcaption>
</figure>
<figure>
  <img src="04-dumbarton-presbytery.png" alt="04-dumbarton-presbytery" loading="lazy">
  <figcaption><span class="id">04-dumbarton-presbytery</span><br>A shared document, not rank or height, organizes four sitters into one symmetrically balanced reading group.</figcaption>
</figure>
<figure>
  <img src="05-thomas-chalmers.png" alt="05-thomas-chalmers" loading="lazy">
  <figcaption><span class="id">05-thomas-chalmers</span><br>Chalmers sits turned three-quarter to the lens in the manner of a painted moderator&#x27;s portrait, his face held near the phi line while a diagonal chest strap and a scholar&#x27;s hand-on-book anchor the seated pose.</figcaption>
</figure>
<figure>
  <img src="06-linton-boys-newhaven.png" alt="06-linton-boys-newhaven" loading="lazy">
  <figcaption><span class="id">06-linton-boys-newhaven</span><br>A diagonal chain of heads carries the eye from the standing fisherman down into the boys huddled in the boat&#x27;s shadow, the working boat standing in for a studio backdrop.</figcaption>
</figure>
<figure>
  <img src="07-willie-liston-redding-line.png" alt="07-willie-liston-redding-line" loading="lazy">
  <figcaption><span class="id">07-willie-liston-redding-line</span><br>A hunched fisherman&#x27;s shadowed gaze and converging coat-lines both drop toward the hands coiling line in his lap, staging labor itself as the frame&#x27;s diagonal.</figcaption>
</figure>
<figure>
  <img src="08-greyfriars-dennistoun-monument.png" alt="08-greyfriars-dennistoun-monument" loading="lazy">
  <figcaption><span class="id">08-greyfriars-dennistoun-monument</span><br>The monument&#x27;s stone axis and entablature square off the frame while the three sitters step up the tomb&#x27;s diagonal base, locking architecture and portraits into one triangulated composition.</figcaption>
</figure>
<figure>
  <img src="09-hill-self-portrait-rock-house.png" alt="09-hill-self-portrait-rock-house" loading="lazy">
  <figcaption><span class="id">09-hill-self-portrait-rock-house</span><br>The stone gatepost&#x27;s plumb vertical edge frames Hill like a studio backdrop, while his slouched, cascading pose runs counter to it, turning architecture into an advertisement that still reads as a chance encounter.</figcaption>
</figure>
<figure>
  <img src="10-edinburgh-ale.png" alt="10-edinburgh-ale" loading="lazy">
  <figcaption><span class="id">10-edinburgh-ale</span><br>Three heads staggered at three different heights ring an unstable triangle around a shared glass, while the outermost man&#x27;s raised hand pulls him into the circle.</figcaption>
</figure>
<figure>
  <img src="11-scott-monument-construction.png" alt="11-scott-monument-construction" loading="lazy">
  <figcaption><span class="id">11-scott-monument-construction</span><br>The spire is squared up dead-center like a specimen against blank sky, its Gothic tracery held frontal and symmetrical, while the base register is left to ordinary documentary clutter -- onlookers, a beached boat -- that grounds the monument in an unfinished, working street.</figcaption>
</figure>
