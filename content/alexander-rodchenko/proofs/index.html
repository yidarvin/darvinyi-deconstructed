<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Alexander Rodchenko — overlay proofs</title>
  <style>
    body { margin: 24px; background: #111827; color: #e5e7eb; font: 16px/1.4 system-ui, sans-serif; }
    main { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    figure { margin: 0; } img { display: block; width: 100%; height: auto; }
    figcaption { margin-top: 6px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Alexander Rodchenko — overlay proofs</h1>
  <main>
    <figure><img src="01-pioneer-with-a-bugle.png" alt="Overlay proof: Pioneer with a Bugle"><figcaption>Pioneer with a Bugle</figcaption></figure>
    <figure><img src="02-radio-listener.png" alt="Overlay proof: Radio Listener"><figcaption>Radio Listener</figcaption></figure>
    <figure><img src="03-girl-with-a-leica.png" alt="Overlay proof: Girl with a Leica"><figcaption>Girl with a Leica</figcaption></figure>
    <figure><img src="04-fire-escape.png" alt="Overlay proof: Fire Escape"><figcaption>Fire Escape</figcaption></figure>
  </main>
</body>
</html>
