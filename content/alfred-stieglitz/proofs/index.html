<h1><span class="c">/* </span>alfred-stieglitz - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-the-steerage.png" alt="01-the-steerage" loading="lazy">
  <figcaption><span class="id">01-the-steerage</span><br>The reproduced print contains a packed field of figures, held between a descending gangway edge and the crossing rail system.</figcaption>
</figure>
<figure>
  <img src="02-winter-fifth-avenue.png" alt="02-winter-fifth-avenue" loading="lazy">
  <figcaption><span class="id">02-winter-fifth-avenue</span><br>This scan records an open book: the snowy avenue appears as a small vertical image on the right-hand page, not as a full-bleed photograph.</figcaption>
</figure>
<figure>
  <img src="03-the-hand-of-man.png" alt="03-the-hand-of-man" loading="lazy">
  <figcaption><span class="id">03-the-hand-of-man</span><br>Rails open from the foreground toward the locomotive while poles and freight cars compress the smoky middle distance.</figcaption>
</figure>
<figure>
  <img src="04-the-flatiron.png" alt="04-the-flatiron" loading="lazy">
  <figcaption><span class="id">04-the-flatiron</span><br>A dark foreground trunk and the Flatiron&#x27;s softened edge counter the pale, misty ground within the mounted print.</figcaption>
</figure>
<figure>
  <img src="05-spring-showers.png" alt="05-spring-showers" loading="lazy">
  <figcaption><span class="id">05-spring-showers</span><br>The supplied scan is a mounted reproduction; within it, a pale child and dark tree make the small image read as a restrained tonal scene.</figcaption>
</figure>
<figure>
  <img src="06-reflections-night.png" alt="06-reflections-night" loading="lazy">
  <figcaption><span class="id">06-reflections-night</span><br>This ingested file is a rotated scan of an illustrated spread; the small landscape reproduction and page structure must be kept distinct.</figcaption>
</figure>
<figure>
  <img src="07-the-street-design-for-a-poster.png" alt="07-the-street-design-for-a-poster" loading="lazy">
  <figcaption><span class="id">07-the-street-design-for-a-poster</span><br>A horse and carriage cross the pale street inside a small mounted reproduction, bracketed by the dark tree and building masses.</figcaption>
</figure>
<figure>
  <img src="08-the-city-of-ambition.png" alt="08-the-city-of-ambition" loading="lazy">
  <figcaption><span class="id">08-the-city-of-ambition</span><br>The city rises in dark vertical masses above water and wharf activity; the small lower figure fixes the scale inside the mounted print.</figcaption>
</figure>
<figure>
  <img src="09-old-and-new-new-york.png" alt="09-old-and-new-new-york" loading="lazy">
  <figcaption><span class="id">09-old-and-new-new-york</span><br>The open construction frame rises beyond a low street of façades and vehicles, while the source sheet remains visibly around the image.</figcaption>
</figure>
<figure>
  <img src="10-a-snapshot-paris.png" alt="10-a-snapshot-paris" loading="lazy">
  <figcaption><span class="id">10-a-snapshot-paris</span><br>The wet boulevard opens around a single walking figure; the left railing supplies the image&#x27;s strongest near-to-far direction.</figcaption>
</figure>
<figure>
  <img src="11-the-last-joke-bellagio.png" alt="11-the-last-joke-bellagio" loading="lazy">
  <figcaption><span class="id">11-the-last-joke-bellagio</span><br>The clustered figures gather around a standing woman, while the dark arch makes a large counterweight behind the group.</figcaption>
</figure>
