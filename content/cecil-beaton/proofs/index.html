<h1><span class="c">/* </span>cecil-beaton - proofs<span class="c"> */</span></h1>
<p class="sub">10 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-st-pauls-through-archway.png" alt="01-st-pauls-through-archway" loading="lazy">
  <figcaption><span class="id">01-st-pauls-through-archway</span><br>A ruined arch turns St Paul&#x27;s into a distant, luminous image within the wreckage.</figcaption>
</figure>
<figure>
  <img src="02-calcutta-tram-bars.png" alt="02-calcutta-tram-bars" loading="lazy">
  <figcaption><span class="id">02-calcutta-tram-bars</span><br>The tram bars divide a crowded row of faces into a shallow, repeated sequence.</figcaption>
</figure>
<figure>
  <img src="03-chengtu-mother-and-child.png" alt="03-chengtu-mother-and-child" loading="lazy">
  <figcaption><span class="id">03-chengtu-mother-and-child</span><br>Two heads and the mother&#x27;s hand make an intimate triangle above the bed&#x27;s horizontal support.</figcaption>
</figure>
<figure>
  <img src="04-chow-chung-yuch-door.png" alt="04-chow-chung-yuch-door" loading="lazy">
  <figcaption><span class="id">04-chow-chung-yuch-door</span><br>A lit profile pauses against the door&#x27;s repeated circular studs and deep dark field.</figcaption>
</figure>
<figure>
  <img src="05-chengtu-man-sun-shadow.png" alt="05-chengtu-man-sun-shadow" loading="lazy">
  <figcaption><span class="id">05-chengtu-man-sun-shadow</span><br>A hard shaft of light crosses the figure, making the boundary between illumination and shadow the portrait&#x27;s main event.</figcaption>
</figure>
<figure>
  <img src="06-desert-jeep-portrait.png" alt="06-desert-jeep-portrait" loading="lazy">
  <figcaption><span class="id">06-desert-jeep-portrait</span><br>Face, forearms, and the steering wheel overlap into a close, sunlit environmental portrait.</figcaption>
</figure>
<figure>
  <img src="07-desert-group-archway.png" alt="07-desert-group-archway" loading="lazy">
  <figcaption><span class="id">07-desert-group-archway</span><br>A monumental threshold organizes the group as a broad, advancing human silhouette.</figcaption>
</figure>
<figure>
  <img src="08-wellington-navigator.png" alt="08-wellington-navigator" loading="lazy">
  <figcaption><span class="id">08-wellington-navigator</span><br>The navigator bends into a compact workstation of chart, hand, cables, and cockpit controls.</figcaption>
</figure>
<figure>
  <img src="09-wellington-rear-gunner.png" alt="09-wellington-rear-gunner" loading="lazy">
  <figcaption><span class="id">09-wellington-rear-gunner</span><br>A face is pressed forward through a dense mechanical enclosure of turret framing and controls.</figcaption>
</figure>
<figure>
  <img src="10-bengali-boy-spinning-wheel.png" alt="10-bengali-boy-spinning-wheel" loading="lazy">
  <figcaption><span class="id">10-bengali-boy-spinning-wheel</span><br>Wheel, thread, and seated worker turn a quiet courtyard into a study of circular labor and light.</figcaption>
</figure>
