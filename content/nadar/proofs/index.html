<h1><span class="c">/* </span>nadar - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-self-portrait-balloon.png" alt="01-self-portrait-balloon" loading="lazy">
  <figcaption><span class="id">01-self-portrait-balloon</span><br>A studio publicity stunt for &#x27;Le Geant&#x27;: the sitters are boxed tight in the basket&#x27;s weave and hung in near-symmetric rigging, while the painted sky&#x27;s own visible edge -- and the onlookers just beyond it -- gives away that this &#x27;ascent&#x27; never left the ground.</figcaption>
</figure>
<figure>
  <img src="02-self-portrait-studio.png" alt="02-self-portrait-studio" loading="lazy">
  <figcaption><span class="id">02-self-portrait-studio</span><br>Against the same blank void he gave his sitters, Nadar isolates his own soft-lit face and bracing hand, broken only by one crisp edge: the starched collar.</figcaption>
</figure>
<figure>
  <img src="03-charles-baudelaire.png" alt="03-charles-baudelaire" loading="lazy">
  <figcaption><span class="id">03-charles-baudelaire</span><br>A face modeled by soft light against total black: the gaze breaks off-axis and the hand tucks into the coat, so the void backdrop and rigid vertical symmetry carry all the psychological weight.</figcaption>
</figure>
<figure>
  <img src="04-sarah-bernhardt.png" alt="04-sarah-bernhardt" loading="lazy">
  <figcaption><span class="id">04-sarah-bernhardt</span><br>The jaw-to-bare-shoulder diagonal, not a squared seated pose, carries the composition, anchored by her face and echoed in the velvet&#x27;s own gathered folds.</figcaption>
</figure>
<figure>
  <img src="05-george-sand.png" alt="05-george-sand" loading="lazy">
  <figcaption><span class="id">05-george-sand</span><br>A portrait staked entirely on facial modeling -- the writer&#x27;s heavy-lidded gaze meets the lens directly despite the three-quarter turn, while the wrap&#x27;s near-symmetric, uneventful drape fills the lower frame with nothing to compete for attention.</figcaption>
</figure>
<figure>
  <img src="06-gustave-dore.png" alt="06-gustave-dore" loading="lazy">
  <figcaption><span class="id">06-gustave-dore</span><br>A working artist rather than a celebrity: Doré turns off the backdrop&#x27;s own symmetry axis, his gaze cast out of frame while the checked scarf cuts the one bold diagonal through the chiaroscuro.</figcaption>
</figure>
<figure>
  <img src="07-franz-liszt.png" alt="07-franz-liszt" loading="lazy">
  <figcaption><span class="id">07-franz-liszt</span><br>Seated frontally in three-quarter light, Liszt&#x27;s pale hair and face fuse into one lit mass whose eyes gather every furrow and hair-strand, while the dark coat and darkening backdrop close around it like a memorial void.</figcaption>
</figure>
<figure>
  <img src="08-eugene-delacroix.png" alt="08-eugene-delacroix" loading="lazy">
  <figcaption><span class="id">08-eugene-delacroix</span><br>Two isolated passages of light -- the face and the white shirt-front -- survive in a portrait otherwise dissolved into black coat and grey void, while Delacroix&#x27;s eyes break off-axis, refusing the lens.</figcaption>
</figure>
<figure>
  <img src="09-alexandre-dumas.png" alt="09-alexandre-dumas" loading="lazy">
  <figcaption><span class="id">09-alexandre-dumas</span><br>A void ground concentrates the eye on two lit passages, face and draped hand, while an unruly crown of hair fills the frame&#x27;s top third.</figcaption>
</figure>
<figure>
  <img src="10-aerial-view-paris.png" alt="10-aerial-view-paris" loading="lazy">
  <figcaption><span class="id">10-aerial-view-paris</span><br>Shot straight down from Nadar&#x27;s balloon, the Place de l&#x27;Etoile&#x27;s radiating boulevards flatten into a plan-view star converging on the Arc de Triomphe -- a geometry only overhead flight could reveal.</figcaption>
</figure>
<figure>
  <img src="11-catacombs-paris.png" alt="11-catacombs-paris" loading="lazy">
  <figcaption><span class="id">11-catacombs-paris</span><br>Depth is built from light and dark rather than converging lines: the eye moves from a lit foreground skull wall, along its own receding edge, past a single lamp-struck pier, into a bone gallery that simply goes black.</figcaption>
</figure>
