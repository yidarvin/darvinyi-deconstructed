<h1><span class="c">/* </span>clarence-h-white - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-ring-toss.png" alt="01-ring-toss" loading="lazy">
  <figcaption><span class="id">01-ring-toss</span><br>The framed room and long floor make the tossed ring and moving girl read as a staged action.</figcaption>
</figure>
<figure>
  <img src="02-girl-with-harp.png" alt="02-girl-with-harp" loading="lazy">
  <figcaption><span class="id">02-girl-with-harp</span><br>A lit face and poised hands at a zither emerge from a nearly black field.</figcaption>
</figure>
<figure>
  <img src="03-blind-mans-bluff.png" alt="03-blind-mans-bluff" loading="lazy">
  <figcaption><span class="id">03-blind-mans-bluff</span><br>The blindfolded figure and the arc of her arms make the staged interior a compact theatrical scene.</figcaption>
</figure>
<figure>
  <img src="04-spring-triptych.png" alt="04-spring-triptych" loading="lazy">
  <figcaption><span class="id">04-spring-triptych</span><br>Repeated panels turn a figure among blossoms into a decorative vertical rhythm.</figcaption>
</figure>
<figure>
  <img src="05-bashful-child.png" alt="05-bashful-child" loading="lazy">
  <figcaption><span class="id">05-bashful-child</span><br>A dark adult&#x27;s long reaching gesture opens the doorway toward the small pale child.</figcaption>
</figure>
<figure>
  <img src="06-the-readers.png" alt="06-the-readers" loading="lazy">
  <figcaption><span class="id">06-the-readers</span><br>Two profiles and an open book are held between the dark room and the bright window.</figcaption>
</figure>
<figure>
  <img src="07-maine-marshes.png" alt="07-maine-marshes" loading="lazy">
  <figcaption><span class="id">07-maine-marshes</span><br>The far marsh band and small water glint reduce the landscape to dark and pale horizontal fields.</figcaption>
</figure>
<figure>
  <img src="08-the-kiss.png" alt="08-the-kiss" loading="lazy">
  <figcaption><span class="id">08-the-kiss</span><br>A doorway encloses two softly joined figures, turning a kiss into a single pale gesture in shadow.</figcaption>
</figure>
<figure>
  <img src="09-morning-bathroom.png" alt="09-morning-bathroom" loading="lazy">

</figure>
<figure>
  <img src="10-the-wrestlers.png" alt="10-the-wrestlers" loading="lazy">
  <figcaption><span class="id">10-the-wrestlers</span><br>A small knot of wrestlers is isolated by a lit opening inside a dark woodland stage.</figcaption>
</figure>
<figure>
  <img src="11-how-much-was-that-a-yard.png" alt="11-how-much-was-that-a-yard" loading="lazy">
  <figcaption><span class="id">11-how-much-was-that-a-yard</span><br>The doorway, measuring gesture, and large dress mass make a domestic transaction into a tableau.</figcaption>
</figure>
