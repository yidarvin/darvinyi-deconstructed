<h1><span class="c">/* </span>alexander-gardner - proofs<span class="c"> */</span></h1>
<p class="sub">11 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-lincoln-cracked-plate.png" alt="01-lincoln-cracked-plate" loading="lazy">
  <figcaption><span class="id">01-lincoln-cracked-plate</span><br>A level, dead-center bust portrait whose symmetry is cut by a hard one-sided shadow, isolated against acres of plain studio ground.</figcaption>
</figure>
<figure>
  <img src="02-lewis-powell-conspirator.png" alt="02-lewis-powell-conspirator" loading="lazy">
  <figcaption><span class="id">02-lewis-powell-conspirator</span><br>Powell&#x27;s frontal stare and centered stance fill the vertical frame; the guard&#x27;s rifle at the left edge and the cane in his own hand are the only reminders he is a prisoner, not a sitter.</figcaption>
</figure>
<figure>
  <img src="03-ruins-richmond-bridge.png" alt="03-ruins-richmond-bridge" loading="lazy">
  <figcaption><span class="id">03-ruins-richmond-bridge</span><br>A landscape built on structural rhythm: the surviving piers recede on a strong diagonal into the Richmond skyline, anchored by the near arch and a canted trackside signal.</figcaption>
</figure>
<figure>
  <img src="04-red-cloud-portrait.png" alt="04-red-cloud-portrait" loading="lazy">
  <figcaption><span class="id">04-red-cloud-portrait</span><br>A dead-center axis and studio oval vignette isolate Red Cloud against a plain backdrop, his draped shoulders and folded hands closing into a stable pyramidal mass beneath a level, direct gaze.</figcaption>
</figure>
<figure>
  <img src="05-burnside-bridge-antietam.png" alt="05-burnside-bridge-antietam" loading="lazy">
  <figcaption><span class="id">05-burnside-bridge-antietam</span><br>A canopy of trees crowds most of the frame, funneling the eye down the bridge&#x27;s receding parapet to the single arch it half conceals.</figcaption>
</figure>
<figure>
  <img src="06-lincoln-mcclellan-antietam.png" alt="06-lincoln-mcclellan-antietam" loading="lazy">
  <figcaption><span class="id">06-lincoln-mcclellan-antietam</span><br>A single gap -- one empty camp chair wide -- breaks the sixteen-man line and isolates Lincoln and McClellan at center; pure lateral spacing does the framing, not a doorway or arch.</figcaption>
</figure>
<figure>
  <img src="07-dunker-church-dead-antietam.png" alt="07-dunker-church-dead-antietam" loading="lazy">
  <figcaption><span class="id">07-dunker-church-dead-antietam</span><br>An acre of foreground dead, pivoting on an abandoned limber, is measured against one calm, small anchor pressed onto a horizon squeezed to the top of the frame.</figcaption>
</figure>
<figure>
  <img src="08-execution-scaffold-conspirators.png" alt="08-execution-scaffold-conspirators" loading="lazy">
  <figcaption><span class="id">08-execution-scaffold-conspirators</span><br>A coping line racks the ranked witnesses above a near-symmetrical timber gallows, whose braced legs and trapdoor stage the drop itself as the picture&#x27;s true subject.</figcaption>
</figure>
<figure>
  <img src="09-crowd-second-inauguration.png" alt="09-crowd-second-inauguration" loading="lazy">
  <figcaption><span class="id">09-crowd-second-inauguration</span><br>An anonymous, unbroken mass of onlookers is individuated only by the diagonal hedge of fixed bayonets receding into depth and the flag raised above it.</figcaption>
</figure>
<figure>
  <img src="10-walt-whitman-portrait.png" alt="10-walt-whitman-portrait" loading="lazy">
  <figcaption><span class="id">10-walt-whitman-portrait</span><br>A literary sitter given the same frontal studio economy as Gardner&#x27;s soldiers and statesmen -- symmetrical bust framing and a plain ground, cut only by Whitman&#x27;s gaze drifting off the lens and the soft coat-and-collar mass anchoring the bottom of the frame.</figcaption>
</figure>
<figure>
  <img src="11-lincoln-mcclellan-tent.png" alt="11-lincoln-mcclellan-tent" loading="lazy">
  <figcaption><span class="id">11-lincoln-mcclellan-tent</span><br>The tent&#x27;s own center pole splits the frame precisely between the two men, whose level gaze bridges that divide across the map-strewn table.</figcaption>
</figure>
