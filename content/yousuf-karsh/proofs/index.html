<h1><span class="c">/* </span>yousuf-karsh - proofs<span class="c"> */</span></h1>
<p class="sub">10 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-winston-churchill.png" alt="01-winston-churchill" loading="lazy">
  <figcaption><span class="id">01-winston-churchill</span><br>The low chair hand and concentrated face make a broad figure feel locked into the frame.</figcaption>
</figure>
<figure>
  <img src="02-albert-einstein.png" alt="02-albert-einstein" loading="lazy">
  <figcaption><span class="id">02-albert-einstein</span><br>Einstein&#x27;s gaze and interlaced hands form a diagonal exchange across the close frame.</figcaption>
</figure>
<figure>
  <img src="03-ernest-hemingway.png" alt="03-ernest-hemingway" loading="lazy">
  <figcaption><span class="id">03-ernest-hemingway</span><br>A frontal head, chair arm, and resting hand make the bright shirt a simple, firm mass.</figcaption>
</figure>
<figure>
  <img src="04-pablo-picasso.png" alt="04-pablo-picasso" loading="lazy">
  <figcaption><span class="id">04-pablo-picasso</span><br>Picasso&#x27;s lit face and hands bridge the blue shirt to the painted vase.</figcaption>
</figure>
<figure>
  <img src="05-george-bernard-shaw.png" alt="05-george-bernard-shaw" loading="lazy">
  <figcaption><span class="id">05-george-bernard-shaw</span><br>The extended glasses hand opens a dark interval before Shaw&#x27;s illuminated head.</figcaption>
</figure>
<figure>
  <img src="06-jean-sibelius.png" alt="06-jean-sibelius" loading="lazy">
  <figcaption><span class="id">06-jean-sibelius</span><br>The portrait concentrates its few highlights on a face above a sharply tied collar.</figcaption>
</figure>
<figure>
  <img src="07-georgia-okeeffe.png" alt="07-georgia-okeeffe" loading="lazy">
  <figcaption><span class="id">07-georgia-okeeffe</span><br>O&#x27;Keeffe is held between the antlers&#x27; overhead gesture and the bright vertical window.</figcaption>
</figure>
<figure>
  <img src="08-audrey-hepburn.png" alt="08-audrey-hepburn" loading="lazy">
  <figcaption><span class="id">08-audrey-hepburn</span><br>A single clean profile is suspended between pale negative space and a dark collar.</figcaption>
</figure>
<figure>
  <img src="09-nelson-mandela.png" alt="09-nelson-mandela" loading="lazy">
  <figcaption><span class="id">09-nelson-mandela</span><br>Mandela&#x27;s raised hand opens the frame while the face remains the answering center.</figcaption>
</figure>
<figure>
  <img src="10-jasper-johns.png" alt="10-jasper-johns" loading="lazy">
  <figcaption><span class="id">10-jasper-johns</span><br>Johns&#x27; hand-held head is counterweighted by the American flag&#x27;s star field.</figcaption>
</figure>
