<h1><span class="c">/* </span>eugene-atget - proofs<span class="c"> */</span></h1>
<p class="sub">12 plates. Deterministic overlays rendered by the composition-analysis skill.</p>
<div class="grid">
<figure>
  <img src="01-storefront-avenue-des-gobelins.png" alt="01-storefront-avenue-des-gobelins" loading="lazy">
  <figcaption><span class="id">01-storefront-avenue-des-gobelins</span><br>Atget&#x27;s vitrine collapses three planes: a frieze of four mannequin heads over a ghostly reflected arch, above a display floor whose perspective drives to a vanishing point below the frame.</figcaption>
</figure>
<figure>
  <img src="02-corner-rue-de-seine-echaude.png" alt="02-corner-rue-de-seine-echaude" loading="lazy">
  <figcaption><span class="id">02-corner-rue-de-seine-echaude</span><br>Deep one-point perspective funnels down a cobbled Old-Paris alley to a luminous passage; two children watch, unnoticed, from a high window.</figcaption>
</figure>
<figure>
  <img src="03-boulevard-de-strasbourg.png" alt="03-boulevard-de-strasbourg" loading="lazy">
  <figcaption><span class="id">03-boulevard-de-strasbourg</span><br>Atget stages the coiffeur&#x27;s vitrine as a proscenium: a frieze of uncanny mannequin busts stares out at eye level while the Paris street ghosts across the glass.</figcaption>
</figure>
<figure>
  <img src="04-pont-neuf.png" alt="04-pont-neuf" loading="lazy">
  <figcaption><span class="id">04-pont-neuf</span><br>Deserted quay staged as deep perspective: moored barges recede toward the distant bridge, the lone mast a vertical caesura, city dissolving in fog across the still Seine.</figcaption>
</figure>
<figure>
  <img src="05-place-saint-medard.png" alt="05-place-saint-medard" loading="lazy">
  <figcaption><span class="id">05-place-saint-medard</span><br>A market square staged in deep perspective: the rue Mouffetard recedes left to a vanishing point, a low ground line sets the stage floor, and the sunlit foreground crowd anchors the human scale between billboard wall and church.</figcaption>
</figure>
<figure>
  <img src="06-cour-de-rohan.png" alt="06-cour-de-rohan" loading="lazy">
  <figcaption><span class="id">06-cour-de-rohan</span><br>An empty courtyard read as one-point perspective: the flaking left wall and right rooflines funnel to a central vanishing point on the eye-level line, with the multi-paned glazed gallery as the vitrine.</figcaption>
</figure>
<figure>
  <img src="07-staircase-hotel-de-brinvilliers.png" alt="07-staircase-hotel-de-brinvilliers" loading="lazy">
  <figcaption><span class="id">07-staircase-hotel-de-brinvilliers</span><br>The straight upper rail recedes to a one-point convergence, then hands off at the landing to the curving wrought-iron banister sweeping down to the newel — an empty stage set framed by the stone-arched doorway.</figcaption>
</figure>
<figure>
  <img src="08-tree-roots-saint-cloud.png" alt="08-tree-roots-saint-cloud" loading="lazy">
  <figcaption><span class="id">08-tree-roots-saint-cloud</span><br>A radial burst: the trunk descends the vertical spine to a root crown from which the roots sprawl outward across the frame.</figcaption>
</figure>
<figure>
  <img src="09-saint-cloud-park.png" alt="09-saint-cloud-park" loading="lazy">
  <figcaption><span class="id">09-saint-cloud-park</span><br>A ruined ivy-clad balustrade recedes right past a massive stone plinth, braced by the vertical ivy trunk under backlit winter trees — Atget&#x27;s decayed formal garden as an empty stage set.</figcaption>
</figure>
<figure>
  <img src="10-fete-du-trone.png" alt="10-fete-du-trone" loading="lazy">
  <figcaption><span class="id">10-fete-du-trone</span><br>A radially symmetric carousel (central axis + platform disc) shot just off-frontal so its canopy rim throws a one-point perspective converging where the ladder rests; the empty cobbled foreground leaves it a deserted stage set.</figcaption>
</figure>
<figure>
  <img src="11-three-prostitutes-rue-asselin.png" alt="11-three-prostitutes-rue-asselin" loading="lazy">
  <figcaption><span class="id">11-three-prostitutes-rue-asselin</span><br>Frontal doorway portrait: the dark opening presses three women into a shallow stage, their faces running in a horizontal row across the upper third while the seam of the crumbling stone base grounds the frame.</figcaption>
</figure>
<figure>
  <img src="12-eclipse-avril-1912.png" alt="12-eclipse-avril-1912" loading="lazy">
  <figcaption><span class="id">12-eclipse-avril-1912</span><br>A frieze of upturned faces below Atget&#x27;s empty Paris stage; the corner building&#x27;s cornice recedes to a one-point vanishing point under the skyline.</figcaption>
</figure>
